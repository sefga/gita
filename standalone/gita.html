<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Бхагавад-Гита в стихах — интерактивная книга для чтения древнеиндийского священного писания с номерами стихов, удобным поиском и сохранением прогресса">
    <title>Бхагавад-Гита — Интерактивная книга</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap"
        rel="stylesheet">
    <style>
/* ===========================
   CSS Custom Properties (Design Tokens)
   =========================== */
:root {
    /* Light Theme */
    --bg-primary: #FAFAFA;
    --bg-secondary: #F0F0F0;
    --bg-tertiary: #E8E8E8;
    --text-primary: #111111;
    --text-secondary: #333333;
    --text-tertiary: #666666;
    --accent: #4A67FF;
    --accent-hover: #3A57EF;
    --border: #E0E0E0;
    --shadow: rgba(0, 0, 0, 0.08);

    /* Typography */
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-serif: 'Source Serif 4', Georgia, serif;
    --font-size-base: 18px;
    --line-height-base: 1.7;
    --content-width: 720px;

    /* Spacing */
    --header-height: 64px;
    --sidebar-width: 280px;
    --toc-width: 240px;

    /* Transitions */
    --transition-fast: 0.15s ease;
    --transition-normal: 0.3s ease;
}

/* Dark Theme */
[data-theme="dark"] {
    --bg-primary: #0E0E0E;
    --bg-secondary: #1A1A1A;
    --bg-tertiary: #252525;
    --text-primary: #F0F0F0;
    --text-secondary: #D0D0D0;
    --text-tertiary: #999999;
    --accent: #6C8CFF;
    --accent-hover: #5C7CFF;
    --border: #2A2A2A;
    --shadow: rgba(0, 0, 0, 0.3);
}

/* ===========================
   Reset & Base Styles
   =========================== */
*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    font-size: var(--font-size-base);
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    font-family: var(--font-serif);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: var(--line-height-base);
    transition: background-color var(--transition-normal), color var(--transition-normal);
    overflow-x: hidden;
}

body.font-sans .content {
    font-family: var(--font-sans);
}

/* ===========================
   Header Styles
   =========================== */
.header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: var(--header-height);
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
    backdrop-filter: blur(10px);
    transition: background-color var(--transition-normal), border-color var(--transition-normal);
}

.header-title h1 {
    font-family: var(--font-sans);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary);
}

/* Header Navigation */
.header-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    justify-content: center;
}

.header-title {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}

.chapter-indicator {
    font-family: var(--font-sans);
    font-size: 0.7rem;
    color: var(--text-tertiary);
    font-weight: 500;
}

.btn-nav-header {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
}

.btn-nav-header:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    transform: scale(1.05);
}

.btn-nav-header:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.btn-nav-header:disabled:hover {
    background: var(--bg-secondary);
    border-color: var(--border);
    color: var(--text-secondary);
    transform: none;
}

.header-actions {
    display: flex;
    gap: 8px;
}

.sidebar-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text-primary);
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    transition: background-color var(--transition-fast);
}

.sidebar-toggle:hover {
    background: var(--bg-tertiary);
}

.btn-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 10px;
    border-radius: 50%;
    transition: all var(--transition-fast);
}

.btn-icon:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

/* Theme Toggle Icons */
[data-theme="light"] .moon-icon,
[data-theme="dark"] .sun-icon {
    display: none;
}

[data-theme="light"] .sun-icon,
[data-theme="dark"] .moon-icon {
    display: block;
}

/* ===========================
   Settings Panel
   =========================== */
.settings-panel {
    position: fixed;
    top: calc(var(--header-height) + 8px);
    right: 24px;
    width: 280px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    z-index: 150;
    box-shadow: 0 8px 32px var(--shadow);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all var(--transition-normal);
}

.settings-panel.active {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.settings-header h3 {
    font-family: var(--font-sans);
    font-size: 0.95rem;
    font-weight: 600;
}

.btn-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    color: var(--text-tertiary);
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
    border-radius: 4px;
    transition: color var(--transition-fast);
}

.btn-close:hover {
    color: var(--text-primary);
}

.settings-group {
    margin-bottom: 16px;
}

.settings-group label {
    display: block;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    color: var(--text-tertiary);
    margin-bottom: 8px;
}

.settings-control {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}

.settings-control span {
    font-family: var(--font-sans);
    font-size: 0.9rem;
    font-weight: 500;
    min-width: 50px;
    text-align: center;
}

.btn-setting {
    font-family: var(--font-sans);
    font-size: 0.9rem;
    font-weight: 600;
    background: var(--bg-tertiary);
    border: none;
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all var(--transition-fast);
}

.btn-setting:hover {
    background: var(--accent);
    color: white;
}

.font-selector {
    display: flex;
    gap: 8px;
}

.btn-font {
    flex: 1;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    font-weight: 500;
    background: var(--bg-tertiary);
    border: 2px solid transparent;
    color: var(--text-secondary);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all var(--transition-fast);
}

.btn-font:hover {
    border-color: var(--accent);
}

.btn-font.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

.btn-theme {
    flex: 1;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    font-weight: 500;
    background: var(--bg-tertiary);
    border: 2px solid transparent;
    color: var(--text-secondary);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all var(--transition-fast);
}

.btn-theme:hover {
    border-color: var(--accent);
}

.btn-theme.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

/* Fun Theme Toggle */
.theme-toggle-wrapper {
    display: flex;
    gap: 8px;
}

.btn-theme-fun {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bg-tertiary);
    border: 2px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-theme-fun:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px var(--shadow);
}

.btn-theme-fun .theme-icon {
    font-size: 1.5rem;
    transition: transform 0.3s ease;
}

.btn-theme-fun:hover .theme-icon {
    transform: scale(1.2);
}

.btn-theme-fun .theme-label {
    font-family: var(--font-sans);
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-tertiary);
}

.btn-theme-fun.active {
    background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(108, 140, 255, 0.4);
}

.btn-theme-fun.active .theme-label {
    color: white;
}

.btn-theme-fun.active .theme-icon {
    animation: bounce 0.5s ease;
}

@keyframes bounce {

    0%,
    100% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.3);
    }
}

/* ===========================
   Sidebar Styles
   =========================== */
.sidebar {
    position: fixed;
    top: var(--header-height);
    left: 0;
    width: var(--sidebar-width);
    height: calc(100vh - var(--header-height));
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 80;
    transition: transform var(--transition-normal), background-color var(--transition-normal);
}

.sidebar-header {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-secondary);
}

.sidebar-header h2 {
    font-family: var(--font-sans);
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-tertiary);
}

.sidebar-nav {
    padding: 8px 0;
}

.chapter-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    font-family: var(--font-serif);
    font-size: 0.9rem;
    line-height: 1.45;
    color: var(--text-secondary);
    text-align: left;
    padding: 12px 20px 12px 24px;
    background: none;
    border: none;
    cursor: pointer;
    transition: all var(--transition-fast);
    border-left: 2px solid transparent;
}

.chapter-item:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

.chapter-item.active {
    background: linear-gradient(90deg, var(--bg-tertiary) 0%, transparent 100%);
    color: var(--accent);
    border-left-color: var(--accent);
}

.chapter-number {
    flex-shrink: 0;
    width: 20px;
    font-family: var(--font-sans);
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-tertiary);
    text-align: right;
}

/* TOC items when displayed in sidebar (mobile) */
.sidebar .toc-item {
    font-family: var(--font-serif);
    font-size: 0.9rem;
    line-height: 1.45;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 10px 20px 10px 24px;
    border-left: 2px solid transparent;
    display: block;
    transition: all var(--transition-fast);
}

.sidebar .toc-item:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

.sidebar .toc-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: linear-gradient(90deg, var(--bg-tertiary) 0%, transparent 100%);
}

.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 75;
    opacity: 0;
    transition: opacity var(--transition-normal);
}

/* ===========================
   Main Content Styles
   =========================== */
.main-content {
    margin-left: var(--sidebar-width);
    margin-right: var(--toc-width);
    padding-top: var(--header-height);
    min-height: 100vh;
}

.reading-progress {
    position: fixed;
    top: var(--header-height);
    left: var(--sidebar-width);
    right: var(--toc-width);
    height: 3px;
    background: var(--accent);
    width: 0%;
    z-index: 90;
    transition: width 0.1s linear;
}

.content {
    max-width: var(--content-width);
    margin: 0 auto;
    padding: 48px 32px 120px;
}

/* Typography */
.content h1 {
    font-family: var(--font-sans);
    font-size: 2.25rem;
    font-weight: 700;
    margin: 56px 0 24px;
    color: var(--text-primary);
    line-height: 1.3;
}

.content h1:first-child {
    margin-top: 0;
}

.content h2 {
    font-family: var(--font-sans);
    font-size: 1.5rem;
    font-weight: 600;
    margin: 48px 0 16px;
    color: var(--text-primary);
    line-height: 1.35;
}

.content h3 {
    font-family: var(--font-sans);
    font-size: 1.2rem;
    font-weight: 600;
    margin: 32px 0 12px;
    color: var(--text-secondary);
    line-height: 1.4;
}

.content h4 {
    font-family: var(--font-sans);
    font-size: 1rem;
    font-weight: 600;
    margin: 24px 0 8px;
    color: var(--text-secondary);
}

.content p {
    margin: 0 0 1.5em;
}

/* Content Tables */
.content table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-family: var(--font-sans);
    font-size: 0.9rem;
}

.content th,
.content td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
}

.content th {
    background: var(--bg-secondary);
    font-weight: 600;
    color: var(--text-primary);
    font-size: 0.85rem;
}

.content tr:hover td {
    background: var(--bg-secondary);
}

.content td {
    color: var(--text-secondary);
}

.content ul,
.content ol {
    margin: 0 0 1.5em;
    padding-left: 1.5em;
}

.content li {
    margin-bottom: 0.5em;
}

.content blockquote {
    margin: 24px 0;
    padding: 16px 24px;
    background: var(--bg-secondary);
    border-left: 4px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: var(--text-secondary);
}

.content hr {
    border: none;
    height: 1px;
    background: var(--border);
    margin: 48px 0;
}

.content strong {
    font-weight: 600;
    color: var(--text-primary);
}

.content em {
    font-style: italic;
}

/* Content Blocks */
.example-block {
    margin: 24px 0;
    padding: 20px 24px;
    background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
    border-radius: 12px;
    border: 1px solid var(--border);
}

.example-block h4 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin: 0 0 12px;
}

.exercise-block {
    margin: 24px 0;
    padding: 20px 24px;
    background: var(--bg-tertiary);
    border-radius: 12px;
    border-left: 4px solid var(--accent);
}

.exercise-block h4 {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--accent);
    margin: 0 0 8px;
}

/* Chapter Navigation */
.chapter-nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    max-width: var(--content-width);
    margin: 48px auto 0;
    padding: 0 20px;
}

.btn-chapter {
    flex: 1;
    max-width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    font-weight: 500;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all var(--transition-fast);
    white-space: nowrap;
}

.btn-chapter svg {
    flex-shrink: 0;
}

.btn-chapter:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
}

.btn-chapter:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.btn-chapter:disabled:hover {
    background: var(--bg-secondary);
    border-color: var(--border);
    color: var(--text-secondary);
}

/* ===========================
   Table of Contents (TOC) Styles
   =========================== */
.toc {
    position: fixed;
    top: var(--header-height);
    right: 0;
    width: var(--toc-width);
    height: calc(100vh - var(--header-height));
    padding: 24px 20px;
    background: var(--bg-primary);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    z-index: 70;
}

.toc h3 {
    font-family: var(--font-sans);
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-tertiary);
    margin-bottom: 16px;
}

.toc-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.toc-item {
    font-family: var(--font-serif);
    font-size: 0.85rem;
    line-height: 1.4;
    color: var(--text-tertiary);
    text-decoration: none;
    padding: 6px 0 6px 12px;
    border-left: 1px solid var(--border);
    transition: all var(--transition-fast);
    display: block;
}

.toc-item:hover {
    color: var(--text-primary);
    border-left-color: var(--text-tertiary);
}

.toc-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
}

.toc-item.level-2 {
    padding-left: 12px;
}

.toc-item.level-3 {
    padding-left: 24px;
    font-size: 0.8rem;
    color: var(--text-tertiary);
    opacity: 0.85;
}

/* ===========================
   Mobile Navigation
   =========================== */
.mobile-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    z-index: 100;
    justify-content: space-around;
    align-items: center;
    padding: 0 20px;
}

.mobile-nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--text-tertiary);
    font-family: var(--font-sans);
    font-size: 0.7rem;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    transition: all var(--transition-fast);
}

.mobile-nav-btn:hover,
.mobile-nav-btn.active {
    color: var(--accent);
    background: var(--bg-tertiary);
}

/* ===========================
   Responsive Styles
   =========================== */
@media (max-width: 1200px) {
    .toc {
        display: none;
    }

    .main-content {
        margin-right: 0;
    }

    .reading-progress {
        right: 0;
    }
}

@media (max-width: 900px) {
    .sidebar {
        transform: translateX(-100%);
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .sidebar-overlay.active {
        display: block;
        opacity: 1;
    }

    .main-content {
        margin-left: 0;
    }

    .reading-progress {
        left: 0;
    }

    .sidebar-toggle {
        display: flex;
    }

    .mobile-nav {
        display: flex;
    }

    .content {
        padding-bottom: 100px;
    }

    /* Hide desktop-only elements on mobile */
    .desktop-only {
        display: none !important;
    }
}

@media (max-width: 600px) {
    :root {
        --header-height: 56px;
        --font-size-base: 16px;
    }

    .header {
        padding: 0 12px;
    }

    /* Compact header navigation on mobile */
    .header-nav {
        gap: 4px;
    }

    .header-title h1 {
        font-size: 0.9rem !important;
        font-family: var(--font-sans) !important;
    }

    .chapter-indicator {
        font-size: 0.6rem;
    }

    .btn-nav-header {
        width: 32px;
        height: 32px;
    }

    .btn-nav-header svg {
        width: 16px;
        height: 16px;
    }

    /* Compact chapter navigation on mobile */
    .chapter-nav {
        gap: 8px;
        padding: 0 16px;
        margin-top: 32px;
    }

    .btn-chapter {
        padding: 8px 12px;
        font-size: 0.8rem;
        max-width: none;
    }

    .btn-chapter span {
        display: none;
    }

    .btn-chapter svg {
        width: 18px;
        height: 18px;
    }

    .content {
        padding: 24px 16px 90px;
        overflow-x: hidden;
    }

    .content h1 {
        font-size: 1.5rem;
        margin: 32px 0 16px;
    }

    .content h2 {
        font-size: 1.2rem;
        margin: 28px 0 12px;
    }

    .content h3 {
        font-size: 1rem;
    }

    .chapter-nav {
        gap: 12px;
        padding: 0 16px;
        margin-top: 24px;
        margin-bottom: 20px;
    }

    .btn-chapter {
        justify-content: center;
        flex: 1;
    }

    .settings-panel {
        right: 12px;
        left: 12px;
        width: auto;
    }
}

/* ===========================
   Scrollbar Styles
   =========================== */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: var(--bg-secondary);
}

::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--text-tertiary);
}

/* ===========================
   Animations
   =========================== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.content {
    animation: fadeIn 0.4s ease;
}

/* ===========================
   Print Styles
   =========================== */
@media print {

    .header,
    .sidebar,
    .toc,
    .mobile-nav,
    .chapter-nav,
    .reading-progress {
        display: none !important;
    }

    .main-content {
        margin: 0 !important;
    }

    .content {
        max-width: 100%;
        padding: 0;
    }
}

/* ===========================
   Loading Indicator
   =========================== */
.loading-indicator {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    gap: 20px;
    color: var(--text-tertiary);
    font-family: var(--font-sans);
}

.loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* ===========================
   Error Message
   =========================== */
.error-message {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    color: #e74c3c;
    font-family: var(--font-sans);
    text-align: center;
    padding: 40px;
}
</style>
</head>

      "title": "Глава 1. Арджуна-вишада-йога",
      "content": "# **Глава 1. Арджуна-вишада-йога**\n\n*Йога отчаяния Арджуны*\n\n---\n\n**1.1.** Царь Дхритараштра вопрошал: «Санджая, что стали делать сыновья мои и Панду сыновья, войны желая, когда собрали армии свои в священной Курукшетре для сраженья?»\n\n**1.2.** Санджая молвил: «Осмотрев ряды войск Пандавов и взвесив положенье, царь Дурьодхана, страха скрыв следы, к ачарье Дроне с речью обратился:\n\n**1.3.** «Взгляни на эту рать, учитель мой, Дрипады сын, обученный тобой, её полки построить умудрился весьма искусно. Славный ученик! Строй Пандавов достаточно велик.\n\n**1.4.** Здесь лучники, которые в бою равны Арджуне с Бхимой. Ююдхана, Вирата и Друпада в их строю,\n\n**1.5.** а также Дхриштакету, Чекитана, царь Каши и могучий Пуруджит.\n\n**1.6.** Здесь Кунтибходжа, Шайбья несравненный. Могучий Юдхаманью тут стоит, и воин силы необыкновенной – Уттамауджа, и Субхадры сын, и сыновья Драупади. Конечно, любой из тех, кто назван мной, успешно способен против множества один в бою на колесницах воевать.\n\n**1.7.** Теперь, о лучший из дважды рождённых, из уст моих ты сможешь услыхать о полководцах тех непревзойдённых, что возглавляют армию мою.\n\n**1.8.** Средь них непобедимые в бою ты сам, а также Бхишма с Карной вместе, и Крипа с Ашваттхамой, и к тому ж Викарна, и другой великий муж, сын Сомадатты.\n\n**1.9.** Я скажу к их чести и к чести тех, кто здесь не назван мной, что в армии моей любой герой пожертвует собой во благо мне. Подвластно им оружие любое. Они владеют искусством боя. И каждый воин опытен вполне.\n\n**1.10.** Мощь наших славных войск неизмерима. Дед Бхишма – это наш надёжный щит. Та армия, что против нас стоит, слабее. Их обороняет Бхима.\n\n**1.11.** Вам всем, на разных рубежах стоящим, свои порядки нужно защищать и так всемерно Бхишму поддержать».\n\n**1.12.** Раскатисто, подобно львам рычащим, дед Бхишма, старший Куру, протрубил.\n\n**1.13.** Звук раковины громкий вдохновил Дурьодхану, усилив радость в нём. Внезапно зашумело всё кругом. Звук раковин и барабанов грохот, гуденье труб, рожков и горнов вой слились в один громоподобный рокот.\n\n**1.14.** Тем временем на стороне другой в небесной колеснице, запряжённой четвёркой белоснежных лошадей, Супруг удачи олицетворённой Шри Кришна, Господин Вселенной всей, и Панду сын, Арджуна, затрубили в божественные раковины враз\n\n**1.15.** и звуком этим раковин тотчас о будущей победе возвестили. Господь Шри Кришна затрубил тогда в ту дивную, чьё имя Панчаджанья, а рядом в Девадатту – Дхананджая, а Бхима-богатырь, чья страсть – еда, в звук Паундры огромной влил свой гнев.\n\n**1.16-18.** Царь Юдхиштхир, сын Кунти, приближая начало, протрубил в Анантвиджаю, Накул – в Сугхошу, также Сахадев взял Манипушпаку и затрубил. Мой господин, звук раковин сообщил, что здесь великий лучник, Каши царь, и Шикханди, известный махаратха, а также Дхриштадьюмна и Вирата. Здесь Сатьяки, Друпада – государь Панчалы, сыновья Драупади и отпрыск Субхадры могучерукий.\n\n**1.19.** Священный трепет породив в груди, их раковин объединились звуки, и твердь и небо гулом оглашая, потомков Дхритараштры сил лишая. От звуков тех им стало страшно, жутко, и дрогнули они.\n\n**1.20.** Тогда Арджуна, чей флаг сам Хануман себе избрал, поднял свой лук и стрелы в руки взял. Но Дхритараштры видя сыновей, построенных в шеренги боевые,\n\n**1.21-22.** Шри Кришне он сказал слова такие: «Ты правишь колесницею моей. Непогрешимый, выведи упряжку меж этих армий, я хочу взглянуть на тех, кого привёл к сраженью путь, с кем биться мне сейчас придётся тяжко.\n\n**1.23.** Позволь, я посмотрю на лица тех, кто, угодить Дурьодхане желая, пришёл сюда сражаться, полагая, что в битве против нас их ждёт успех».\n\n**1.24.** Санджая молвил: «Просьбу эту слыша, сам Повелитель чувств, Господь Шри Кришна, чудесную Арджуны колесницу, о Бхарата, тотчас установил меж грозных армий.\n\n**1.25.** Он заговорил, седого Бхишмы с Дроной видя лица и лица всех собравшихся царей: «Взгляни в глаза династии своей, о Партха!».\n\n**1.26.** Стоя между берегов враждующих непримиримых ратей, Арджуна там узрел отцов, дедов, своих учителей, своих дядьёв по матери, своих увидел братьев,\n\n**1.27.** и сыновей, и внуков, и друзей, и тестей, и людей, добра желавших. И, видя их, на поле том стоявших, горюя о династии своей и о друзьях, с великим состраданьем Арджуна, Кунти сын, скорбя, сказал:\n\n**1.28.** «О Кришна, пред собой я увидал своих родных, охваченных желаньем войны. Я ощущаю, что сейчас все части тела сила покидает, внутри озноб, во рту пересыхает.\n\n**1.29.** Я весь дрожу, но это не экстаз, а ужас. Дыбом волосы встают, из рук мой лук Гандива выпадает, и кожа, словно от огня, пылает.\n\n**1.30.** Я не способен оставаться тут. Тускнеет память. В разуме – смятенье. О Кришна, всё, что вижу я сейчас, – знаменье бед, что ожидают нас.\n\n**1.31.** Убив родных в сраженье, какое же я благо получу? Доставшихся столь дорогой ценою я ни побед, ни власти над Землёю, ни радости, о Кришна, не хочу.\n\n**1.32-35.** О Говинда, зачем нам это царство и наслажденья, да и наша жизнь, коль все, кем ценно было государство, сейчас собрались головы сложить на поле битвы? О Мадхусудана, учителя, отцы, деды, сыны, и дяди с материнской стороны, и тесть, и внук, и зять, и брат жены, и остальные родственники клана сейчас готовы, стоя предо мной, уйти ни с чем в посмертную обитель. Пусть даже я отправлюсь в мир иной от их руки, но участи такой могу ли им желать я? О Хранитель живых существ, я с ними не хочу сражаться, даже если захвачу три мира, о Земле что говорить! Какая радость в том, что мы сумеем потомков Дхритараштры умертвить?\n\n**1.36.** Но, безусловно, если мы посмеем убить грозящих нам войной сейчас, то этот тяжкий грех падёт на нас. Поэтому мы не должны стремиться к убийству Дхритараштры сыновей, своей родни и всех своих друзей.\n\n**1.37.** Чего сумеем этим мы добиться, о Мадхава? Как может смерть родни украсить счастьем будущие дни? Пусть эти люди, чьи сердца в плену у жадности, не видят прегрешенья в том, что ведёт семью к уничтоженью и от вражды не чувствуют вину...\n\n**1.38.** Но почему же мы, осознавая, что уничтожить род – преступный шаг, должны, людей Защитник, делать так, большое злодеянье совершая?\n\n**1.39.** Когда приносит рода истребленье семье традиций вечных разрушенье, приходится оставшимся в живых существовать, религию забыв.\n\n**1.40.** Когда в роду безбожье процветает, о Кришна, это женщин развращает. Потомок Вришни, это в свой черёд\n\n**1.41.** к потомству нежеланному ведёт. Рожденье нежеланных поколений толкает в ад и членов их семей, и тех, кто был причиной разрушений, и предков, ведь обряды подношений воды и пищи в жизни их детей\n\n**1.42.** прекращены. Так в Ведах говорится. Грех к нежеланным отпрыскам ведёт. Такие дети разрушают род. То, что на благо общества творится, культура, вековой уклад семей, – всё терпит крах.\n\n**1.43.** А участь тех людей, в чьих семьях нет религии следа, – в аду обосноваться навсегда. Джанардана, Хранитель всех людей,\n\n**1.44.** я слышал это от учителей. Увы, как странно, что тягчайший грех мы совершить замыслили в надежде, что насладимся недоступным прежде правленьем, уничтожив близких всех.\n\n**1.45.** Пусть лучше Дхритараштры сыновья с оружием в руках на поле боя убьют меня в тот час, когда любое оружье бросив, им не стану я противиться».\n\n**1.46.** Санджая продолжал: «Промолвив так на этом поле брани, Арджуна, тяжким горем в сердце ранен, вдруг на сиденье колесницы пал и стрелы вместе с луком отложил». Тогда Шри Кришна с ним заговорил."

      "content": "# **Глава 2. Санкхья-йога**\n\n*Йога познания (Краткое изложение)*\n\n---\n\n**2.1.** Санджая молвил: «Видя скорбь и милость в глазах Арджуны, полных горьких слёз, Мадхусудана, Кришна, произнёс\n\n**2.2.** божественные речи: «Как случилось, что эта скверна в трудный час пришла и в заблужденье ум твой привела? Арджуна, эта слабость тех пленяет, кто жизни высший смысл не сознаёт. Она к бесславью, а не в Рай ведёт.\n\n**2.3.** Бессилие отринь! Не подобает тебе, сын Притхи, унижаться так. Герой, тебе покорен всякий враг. Воспрянь и малодушье одолей».\n\n**2.4.** Арджуна молвил: «Как таких людей, как Бхишма с Дроной, я могу разить, пуская стрелы, о Мадхусудана? Им нужно поклоняться, и служить, и выражать почтенье постоянно, о недругов великий победитель.\n\n**2.5.** Среди старейшин каждый – мой учитель. Уж лучше попрошайкой нищим стать, чем беззаботно здесь существовать ценою жизни лучших из людей, великих душ, моих учителей. И пусть не бескорыстны их стремленья, они – мои наставники. Когда мы их убьём, то кровью навсегда все будущие наши наслажденья покроются.\n\n**2.6.** К тому же мы не знаем, что лучше: победить иль проиграть. Сразив потомков Дхритараштры рать, стоящую пред нами, потеряем мы жизни смысл.\n\n**2.7.** Уже не знаю я, в чём долг мой. Как скупец, что слаб в служенье, я сил лишился, в сердце – заблужденье. Прошу, скажи мне, правды не тая, в чём благо. Я теперь – послушник Твой, учи Тебе предавшуюся душу.\n\n**2.8.** Не знаю я, чем скорбь свою разрушу, что жжёт меня. Пусть буду я землёй цветущей без соперников владеть иль даже стану тем, кто небом правит, – меня от скорби это не избавит».\n\n**2.9.** Санджая молвил: «Тот, кто одолеть невежество способен и врагов, сказав Владыке чувств такие речи, добавил: «Я уйду от этой сечи. О, Радующий чувства и коров, сражаться я не буду», – и умолк.\n\n**2.10.** Арджуны скорбь Господь улыбкой встретил и так ему, о Бхарата, ответил, меж армий находясь:\n\n**2.11.** «Ты знаешь толк в речах учёных, но скорбишь о том, что не достойно вовсе сожаленья. Кто мудр, тот не горюет о живом, как и о мёртвом.\n\n**2.12.** Не было мгновенья, чтоб Я и ты, и прочие цари не жили, и в грядущем не случится, что наша жизнь однажды прекратится.\n\n**2.13.** Душа, что воплощается внутри материи, свои тела меняет от детства к ранней юности, пока в конце не примет тело старика. Вот так и после смерти принимает она другое тело. Обмануть не могут мудрых эти превращенья.\n\n**2.14.** Сын Кунти, счастья, горя ощущенья, как лето и зима, когда-нибудь уходят, чтобы вновь явиться к нам, они – всего лишь плод прикосновенья чувств к их объектам. Наберись терпенья, о Бхарата, подобно мудрецам, сноси невозмутимо перемены.\n\n**2.15.** Кто в горе, как и в счастье, терпелив, всегда спокоен и не суетлив, воистину достоин жить вне плена иллюзии, о лучший из людей.\n\n**2.16.** Те мудрецы, что Истину узрели, признали, изучая душу в теле, что тело в силу бренности своей не существует, существует то, что вечно, как душа, и неизменно. Познав природу вечности и тлена, они имеют истинный итог.\n\n**2.17.** Неразрушимо то, чем это тело пронизано. Так знай же, что никто бессмертный дух не может смертным сделать.\n\n**2.18.** Обречено на разрушенье то, что бренно, – тело неуничтожимых, неизмеримых душ, что вечно живы. Поэтому, о Бхарата, сразись!\n\n**2.19.** Кто душу убивающей считает и тот, кто мнит, что душу убивают, – невежды, ибо жизнь не погибает, и на убийство не способна жизнь.\n\n**2.20.** Душа не знает смерти и рожденья. Теперь, в прошедшем, в будущем она вне сотворенья и возникновенья. Душа извечна и не рождена. Её существованью нет предела,\n\n**2.21.** преграды. Изначальная, она не погибает, если гибнет тело, в котором жизнь – душа – воплощена. Сын Притхи, как сумевший осознать, что жизнь неразрушима и нетленна, никем не рождена и неизменна, убьёт или заставит убивать?\n\n**2.22.** Владелец, сняв костюм, что постарел, уж новую одежду надевает. Так и душа, уйдя из старых тел, затем тела другие принимает.\n\n**2.23.** Её нельзя оружием рассечь, и жар огня её не может сжечь, Её никак нельзя водой смочить и невозможно ветром иссушить.\n\n**2.24.** Ей, вечной, существующей везде, стабильной, неподвижной, неизменной, не суждено быть смоченной в воде, иссушенной, разрубленной и тленной.\n\n**2.25.** Душа незрима, и непостижима, и неизменна. Ты, узнав о ней, стать не достоин жертвою скорбей о теле.\n\n**2.26.** Даже если то, что живо, по-твоему, рождается всегда, чтоб умереть навечно, и тогда причин для скорби нет.\n\n**2.27.** Но мудрый знает: рождённый обязательно умрёт, умерший неизбежно обретёт рожденье. Значит, долг свой исполняя, не должен ты скорбеть.\n\n**2.28.** Ведь все творенья вначале не проявлены. Затем в средине есть период проявленья разнообразных материальных тел, о Бхарата, в конце – уничтоженье, творенье не проявлено опять. Так стоит ли об этом горевать?\n\n**2.29.** Одни глядят на душу, как на чудо, другие как о чуде говорят, а третьи слышат, ибо им твердят другие, что душа подобна чуду. Но есть и те, кто, о душе узнав, живут как прежде, душу не поняв.\n\n**2.30.** Существ извечных, в теле воплощенных, никак нельзя убить, и потому тебе скорбеть не нужно о рождённых, о Бхарата.\n\n**2.31.** По долгу твоему нет у тебя причин, чтоб сомневаться. Для воина занятий лучше нет, чем, защищая Истину, сражаться.\n\n**2.32.** Ворота райских радостных планет пред теми открываются царям, что счастливы, сын Притхи, от того что битвы их зовут в объятья сами.\n\n**2.33.** Коль ты, не помня долга своего, уйдёшь от битвы, грех пренебреженья твоим священным долгом даст свой плод: как воин ты утратишь уваженье.\n\n**2.34.** Среди людей в веках молва пойдёт про твой позор. Бесчестье испытать тому, кто уважаем и прославлен, мучительней, чем даже смерть принять.\n\n**2.35.** Род воинов, который был поставлен над многими, тогда решит: «Увы, герой, столь чтимый нами, стал трусливым: боясь в бою лишиться головы, он битвы избежал».\n\n**2.36.** Упрёкам лживым и злым речам враги твои тотчас дадут свободу, над тобой смеясь.\n\n**2.37.** Что может быть для воина больнее, чем это? Выбор прост, о Каунтея: ты или гибнешь в битве, достигая обители небесной, то есть Рая, иль, если ты в сраженье победишь, как повелитель над землёй царишь.\n\n**2.38.** Поэтому вставай, не уклоняйся, поверь в удачу твёрдо и сражайся! Став равнодушным к счастью и к беде, к потерям, так же как к приобретеньям, к победам, равно как и к пораженьям, сражайся ради битвы. Ты нигде и никогда не совершишь греха, так действуя.\n\n**2.39.** Я знание пока передавал тебе, разъединяя материю и дух. Теперь услышь о том, как, бескорыстно поступая, сын Притхи, ты себя освободишь от бремени былых своих грехов, от нынешних и будущих оков.\n\n**2.40.** Кто встал на этот путь – потерь не знает, усилия его не пропадут, и даже малый шаг его спасает от величайших бед.\n\n**2.41.** Все, кто идут таким путём, решительны. Их разум направлен на одну лишь цель. Но те, кто думает о многих целях сразу, конечно, пребывают в суете. Потомок Куру, разум их ветвистый лишает их решимости.\n\n**2.42-43.** Людей, что не богаты мудростью своей, влечёт, о Партха, Вед язык цветистый, зовущий к получению плодов\n\n**2.44.** от многих ритуалов и трудов. Стремясь для чувств услады обрести, они обряды пышно совершают, поскольку рая, роскоши желают, и, двигаясь к могуществу, считают, что нет превыше этого пути. Кто слишком к удовольствиям привязан, чей ум богатством мира ослеплён, не может к Богу устремить свой разум, поскольку в заблужденье введён.\n\n**2.45.** Три гуны: благость, страсть и тьма незнанья, – вот основная тема Вед. Арджун, стань выше этих качеств, или гун, и утвердись в духовном состоянье. От двойственности мира отрешась и не заботясь о приобретенье богатства, славы иль о сохраненье, порвав с корыстным настроеньем связь,\n\n**2.46.** в себе постигни истинное «Я». Всю воду для полива иль питья, которую в колодце мы найдём, с избытком даст огромный водоём. Так тот, кто в Ведах высший смысл нашёл, все блага, в них хранимые, обрёл.\n\n**2.47.** Ты можешь честно долг свой исполнять, но не плодами действий наслаждаться. Причиною плодов себя считать нельзя, как и от долга уклоняться.\n\n**2.48.** Богатств завоеватель, Дхананджая, невозмутимо долг свой исполняя, привязанность отринь. Вступая в бой, не думай о победе, пораженье. Зовётся йогой стойкое уменье владеть уравновешенно собой.\n\n**2.49.** Отринь любой порок без лишних слов, пребудь в любовном преданном служенье, отдайся Богу в этом настроенье.\n\n**2.50.** Скупцы хотят плодов своих трудов, о Дхананджая. Кто с Всевышним связан, служению Ему отдав свой разум, за жизнь свободным станет от любых последствий злых и добрых дел своих. Поэтому войди сознаньем в йогу, жизнь целиком отдав служенью Богу, Всевышнему, источнику блаженства, ведь это – всех поступков совершенство.\n\n**2.51.** Те, кто всё время думают о Боге, служа Ему, снимают кармы груз, так вырываясь из жестоких уз рождений и смертей. Они в итоге свободно достигают тех планет, где нет иллюзий и страданий нет.\n\n**2.52.** Когда твой разум, занятый служеньем, иллюзий дебри сможет одолеть, ты станешь безразличным к наслажденьям, о коих слышал и услышишь впредь.\n\n**2.53.** Когда твой ум не будет знать волненья от звуков Вед, зовущих в Рай тебя, а разум твой пребудет в просветленье, ты осознаешь вечного себя».\n\n**2.54.** Арджуна молвил: «Что же отличает того, кто Богом в сердце просветлён? О Кришна, как он мысли излагает, а также как сидит и ходит он?»\n\n**2.55.** Господь сказал: «О Партха, говорится, что человек, освободивший ум от жадности, что в чувствах коренится, и всевозможных похотливых дум, который счастье в вечности черпает, в божественном сознанье пребывает.\n\n**2.56.** Кто сносит все страданья, не скорбя, кто радостей не ждёт, чей ум спокоен, кто ничего не хочет для себя, кто не гневлив, бесстрашен, тот достоин назваться настоящим мудрецом с устойчивым, обузданным умом.\n\n**2.57.** Кто, в мире материальном проживая, привязанности к бренному не зная, уже уравновешенность обрёл, – спокоен в счастье и в беде не зол, – тот совершенным знаньем обладает.\n\n**2.58.** Духовный разум твёрд и крепок в том, кто чувства от соблазнов отвлекает. Так черепаха в панцире своём умеет внутрь конечности вбирать.\n\n**2.59.** От удовольствий чувства удержать дух воплощённый, следуя запретам, способен, сохраняя всё равно вкус к прежним наслажденьям при этом. От бренного отречься тем дано, кто более высокий вкус познал и так в сознанье верным Богу стал.\n\n**2.60.** Но чувства так могучи, безусловно, что и насильно могут увлекать ум даже тех, кто хочет обуздать их мощь, владея знанием духовным, сын Кунти.\n\n**2.61.** Кто все чувства подчинил, их от соблазнов мира отстраняя, свой ум ко Мне всецело направляя, тот твёрдо разум свой установил.\n\n**2.62.** Кто к временному чувства устремляет, привяжется к нему, а в свой черёд привязанность желанье порождает,\n\n**2.63.** а из желанья гнев произойдёт. Из гнева возникает заблужденье, которое так трудно превозмочь, из заблужденья – памяти затменье, беспамятство уносит разум прочь.\n\n**2.64.** Кто разум свой утратил, тот падёт с достигнутых сознанием высот. Но кто, живя по Ведам, выше стал привязанности или отвращенья и кто служеньем чувства обуздал, воистину, достоин обретенья прасада, Божьей милости.\n\n**2.65.** А тот, кто милостью Господней стал доволен, причины для страданий не найдёт, когда же он страданьями не болен, устойчив станет вскоре разум в нём.\n\n**2.66.** Кто связи со Всевышним не имеет, духовным сделать разум не сумеет, не сможет он и совладать с умом.\n\n**2.67.** А если ум чего-то жаждет, просит, то человек не умиротворён. Без мира где отыщет счастье он? Как лодку ветром по воде уносит, так и средь праздных чувств всего одно, которое умом завладевает, но Богу вовсе не посвящено, себе и разум также подчиняет.\n\n**2.68.** Арджуна, обладатель сильных рук, способный победить врагов вокруг, любой, кто чувства может превозмочь, кто все их от соблазнов отстраняет, тот разумом могучим обладает.\n\n**2.69.** Когда для всех существ приходит ночь, владеющий собою бодр. Когда для всех приходит время пробужденья, мудрец, развивший внутреннее зренье, считает, что настала ночь.\n\n**2.70.** Вода, впадая в океан из многих рек, его покой никак не потревожит. Подобен океану человек, который быть всегда спокойным может, от чувственных желаний отстранясь.\n\n**2.71.** Лишь он познает умитворенье, но не другие, в ком живёт стремленье достичь всего, желанного сейчас. Мир в сердце обретает только тот, кто полностью изжил в себе стремленье испытывать любое наслажденье от чувств своих, тот, кто свободен от малейшего корыстного желанья и от мирского чувства обладанья,\n\n**2.72.** кто самомненья ложного лишён. Вот путь, который Богу посвящён. Вступивший на него герой идёт туда, где ждёт его освобожденье от всех иллюзий или заблужденья. Закончив жизнь, он к Господу придёт."

      "title": "Глава 3. Карма-йога",
      "content": "# **Глава 3. Карма-йога**\n\n*Йога действия (Путь бескорыстного труда)*\n\n---\n\n**3.1.** Арджуна молвил: «Если Ты считаешь, что путь познанья лучше добрых дел, то почему меня Ты вовлекаешь, Джанардана, в уничтоженье тел? Ведь это дело, Кешава, ужасно.\n\n**3.2.** Смущён мой разум двойственностью фраз. Поэтому прошу, скажи мне ясно, где путь ко благу для меня сейчас?»\n\n**3.3.** Всевышний так ответил: «В мире этом два вида в душу верящих людей идут к познанью сущности своей. Тебе, безгрешный, Я сказал об этом чуть раньше. Путь анализа творенья – для тех, кому по нраву размышленья. Путь преданности те предпочитают, кто Мне своё служенье предлагают.\n\n**3.4.** Уйдя от дел, нельзя освободиться от их последствий, внешне отрешась от мира, совершенства не добиться.\n\n**3.5.** Все существа, беспомощно склонясь перед своей природой, и мгновенья не могут ничего не совершать. Всем качества дала природа-мать. И, безусловно, по её веленью все действуют по качествам своим.\n\n**3.6.** Кто чувства только внешне подчиняет, но их в уме всё время услаждает, тот глуп, конечно, и собой самим обманут. Он притворщик.\n\n**3.7.** Выше тот, кто и в уме все чувства подчиняет, привязанность к мирскому отвергает, а деятельность Богу посвящает, хоть и в миру, среди людей, живёт.\n\n**3.8.** Обязанности честно исполняй. Работать лучше, чем сидеть без дела. Ведь без работы даже нужды тела не удовлетворить.\n\n**3.9.** Сын Кунти, знай: любое дело нужно выполнять лишь ради Вишну, словно подношенье, иначе будет долг порабощать, приковывая к этому творенью. Верши для Бога все дела свои – падут оковы бренные твои навек.\n\n**3.10.** Когда в былые времена Господь создал людей с полубогами и прочими живыми существами, и жертвами в честь Вишну, Он сполна благословил их всех, повелевая: «Живите в счастье, жертвы совершая!\n\n**3.11.** Они дают желаний исполненье, и процветанье, и освобожденье. Пусть жертвы ваши удовлетворят полубогов, довольные и вами, они, конечно, мир благословят земными и небесными дарами.\n\n**3.12.** За ваши жертвы полубоги вам подарят всё, что в жизни вам желанно. Кто, наслаждаясь этим неустанно, не предлагает дар полубогам, тот вор.\n\n**3.13.** Кто предан Богу, тот вкушает ту пищу, что была поднесена Всевышнему, и так освобождает себя от всех грехов своих сполна. Кто ради своего же наслажденья готовит, не свершая подношенья Всевышнему, вкушает только грех».\n\n**3.14.** Растенья, злаки служат пищей всех других существ. Растенья дождь питает. Дожди же потому с небес идут, что люди жертвы, ягью, совершают, а жертвоприношения берут начало в выполненье действий тех, что Господом предписаны для всех.\n\n**3.15.** Законы действий человека в мире – суть Веды. Знай, что слово Вед в эфире Всевышний Сам явил. И потому Господь, который всюду проникает, в священной ягье вечно пребывает. Все жертвы лучше посвятить Ему.\n\n**3.16.** Кто, в теле человека пребывая, не совершает жертв круговорот, так предписаний Вед не исполняя, живёт в грехе. Его к себе влечёт лишь то, что чувства тела наслаждает. Он жизнь свою впустую проживает.\n\n**3.17.** Но для того, кто удовлетворён, внутри себя черпая наслажденье, кто к самоосознанью устремлён, познав покой и умиротворенье, не существует никаких долгов.\n\n**3.18.** Тот, кто и впрямь познал, кто он таков, работает, писаньям подчиняясь, не ищет дел, от дел не уклоняясь, живёт, не ставя целью свой успех, средь всех, но независимо от всех.\n\n**3.19.** Без всяческой приязни посему живи согласно долгу своему. Кто трудится, но выгоды не ждёт, так действуя, к Всевышнему придёт.\n\n**3.20.** Царь Джанака, те, кто ему под стать, в минувшем совершенства достигали лишь потому, что долг свой исполняли. Так действуй, чтоб другим пример подать.\n\n**3.21.** Народ в любых делах идёт за тем, кто почитаем, кто вселяет веру. Какой бы он пример ни подал всем, последует весь мир его примеру.\n\n**3.22.** Сын Притхи, в трёх мирах нет дел таких, какие был бы Я свершить обязан. Я нуждами и целями не связан, но Я не оставляю дел Своих.\n\n**3.23.** Сын Притхи, если б Я хоть раз однажды усердно перестал Свой долг блюсти, Я подал бы пример, и знай, что каждый во всём бы шёл по этому пути.\n\n**3.24.** Тот долг, что в Ведах дан, не исполняя, Я б стал причиной гибели планет, причиной появленья на свет детей нежданных, этим нарушая покой живых существ.\n\n**3.25.** Корысти ради невежды долг свой могут исполнять. Но Истину сумевшие понять пусть действуют, не мысля о награде, а лишь затем, чтоб к Истине вести.\n\n**3.26.** Чтоб в ум невежд, чья цель – услады тела, смятенье словами не внести, мудрец обязан вовлекать их смело в дела благие, а не отвращать от дел. Им легче будет суть понять.\n\n**3.27.** Душа, что ложной самости полна, себя причиной действия считает, которое свершает не она, а гуны материальные свершают.\n\n**3.28.** О Сильнорукий, тот, кто осознал всю Истину, тот не привязан стал к влиянью гун, он больше никогда искать не будет в бренном наслажденья, поскольку знает разницу всегда меж действиями в преданном служенье и действиями ради их плодов.\n\n**3.29.** Обманутые гунами, невежды запутаны в сетях мирских трудов, но возлагают на труды надежды. Мудрец не должен их умы смущать, пусть даже он прекрасно понимает, что эти люди Истины не знают. Им день себя как душу познавать.\n\n**3.30.** Мне действия любые посвящай и так Меня всецело осознай. Отбрось свою корысть и откажись от всяких притязаний на владенье хоть чем-то, от тоски освободись, апатию стряхни, вступи в сраженье!\n\n**3.31.** Кто следует наказу Моему, обязанности строго выполняя, Моё ученье свято почитая, и злобы не питая ни к кому, становится свободен от цепей закона кармы.\n\n**3.32.** Те же из людей, кто глуп, кто наставления Мои из зависти и злобы отвергают, те сбиты с толку, ничего не знают. Они не могут действия свои Всевышнему как должно посвящать. Им в жизни совершенными не стать.\n\n**3.33.** Но даже если человек учён, он действовать в трёх гунах продолжает. Никто врождённых качеств не лишён, и каждого природа вынуждает согласно этим свойствам поступать. Зачем же их пытаться подавлять?\n\n**3.34.** Привязанность, а также отвращенье рождаются от соприкосновенья чувств с бренным миром. Сможет только тот всегда свободным быть от их влияний, кто, подчинив себя словам писаний, по правилам и принципам живёт.\n\n**3.35.** На поводу не следует идти у неприязни или же пристрастья, ведь это – лишь преграды на пути к Всевышнему и к достиженью счастья. Свой долг гораздо лучше выполнять, высот, возможно, и не достигая, чем знатоком в чужих занятьях стать. Уж лучше, долг свой честно исполняя, погибнуть, чем в чужом преуспевать. Опасный путь – другому подражать».\n\n**3.36.** Арджуна произнёс: «Но что людей жить против воли Бога заставляет? Ответь, потомок Вришни, силой чьей они грешат, хотя и не желают?»\n\n**3.37.** Всевышний так ответил: «О Арджуна, та сила – вожделенье, и оно всегда бывает в гнев превращено. Его рождает страсть иль раджо-гуна. Знай: в этом бренном мире вожделенье – всепожирающий, греховный враг всех душ.\n\n**3.38.** Как покрывает дым горенье, пыль – зеркало, утроба – плод, вот так и душу вожделенье покрывает.\n\n**3.39.** Так чистое живое существо, что изначально знаньем обладает, живёт, как раб, под властью своего извечного врага, что губит знанье.\n\n**3.40.** Сын Кунти, вожделенья аппетит огнём всепожирающим горит. Пристанище для этого желанья – ум с чувствами и разум. Силой их оно скрывает знание живых созданий, их в иллюзию ввергая.\n\n**3.41.** Поэтому вначале, подчиняя все чувства, вырви корень всех грехов. О лучший среди Бхарат, вожделенье – враг знанья и духовного прозренья. Срази его, главу своих врагов.\n\n**3.42.** Ведь чувства в теле, Веды говорят, над мёртвою материей стоят, ум выше чувств, а разум – над умом, над разумом – душа.\n\n**3.43.** Так, понимая, что в теле выше всех душа живая, в сознанье Бога разум погружая, смири свой ум в служении своём. Арджуна сильнорукий, покори духовной силой, силой осознанья, того врага, что спрятался внутри в обличье ненасытного желанья»."

      "title": "Глава 4. Джнана-карма-санньяса-йога",
      "content": "# **Глава 4. Джнана-карма-санньяса-йога**\n\n*Йога знания и отречения от деятельности*\n\n---\n\n**4.1.** Господь Шри Кришна далее сказал: «Я в прошлом богу Солнца Вивасвану науку вечной йоги объяснял, бог Солнца передал науку Ману, отцу людей, а Ману передал царю Икшваку то, что услыхал.\n\n**4.2.** Так по цепи святых учителей великая наука связи с Богом дошла до мудрых праведных царей. Теперь она утрачена во многом, ведь цепь учителей оборвалась со временем.\n\n**4.3.** То древнее ученье, что с Господом описывает связь в любовном вечном преданном служенье, Тебе сегодня открываю Я. Божественную тайну бытия постичь как должно можешь ты вполне, поскольку ты – Мой друг и предан Мне».\n\n**4.4.** Арджуна произнёс: «Но Ты родился позднее бога Солнца. Как понять, что мог его Ты йоге обучать, когда на свет ещё не появился?»\n\n**4.5.** Господь сказал: «Я помню все рожденья, когда на свет являлись ты и Я. И пусть врагов пленяет мощь твоя, но ты не помнишь эти появленья.\n\n**4.6.** Хоть Я и не рождённый, хоть Я – тот, чьё тело трансцендентное нетленно, и Я – Верховный Бог всех, кто живёт, Я в каждую эпоху неизменно посредством силы внутренней Моей являюсь во вселенной материальной в Своей духовной форме изначальной, что выше гун, рождений и смертей.\n\n**4.7.** Всегда и всюду, Бхарата, когда религия в упадке пребывает\n\n**4.8.** и общество безбожью уступает, Себя являю миру Я тогда. Чтоб тех, кто предан Мне, освободить, злодеев истребить и в довершенье религии законы возродить, из века в век Я нисхожу в творенье.\n\n**4.9.** Тот, кто познал воистину Мою божественную жизнь и появленье, не будет вновь испытывать рожденье. Оставив тело, он войдёт в Мою нетленную обитель, о Арджун.\n\n**4.10.** Из сердца устранив приязнь к мирскому, и страх, и гнев, Мне посвятив свой ум, найдя во Мне прибежище, основу, лишь Мне предавшись, многие смогли Меня постичь во времена былые. Очистившись, все личности такие ко Мне любовь святую обрели.\n\n**4.11.** Как именно Мне люди предаются, так Я вознаграждаю их. Во всём, сын Притхи, все идут Моим путём.\n\n**4.12.** Желая к райской жизни прикоснуться и так достичь плодов своих трудов, здесь почитают временных богов. Конечно, быстро от усилий тех приходит к людям временный успех.\n\n**4.13.** Я на четыре варны¹ разделил по качествам и действиям природным всё общество. Хоть Я и породил всё это, неизменным и свободным от дел любых Я вечно остаюсь.\n\n**4.14.** Деяния Меня не оскверняют, и к их плодам Я также не стремлюсь. Все те, кто это ясно понимают, подобно Мне, не попадутся в сеть последствий дел своих.\n\n**4.15.** В минувшем все, воистину достигшие свободы, имели понимание Моей духовной, независимой природы и исполняли долг в служенье ей. Ты исполняй свой долг подобно им.\n\n**4.16.** И мудрецы порою в затрудненье: «Что принесёт душе освобожденье? И чем себя мы вновь поработим?» Сейчас Я расскажу тебе о том, как действовать, себя освобождая от всех проблем.\n\n**4.17.** Жить нужно, сознавая суть дел, что постигается с трудом: где райский путь, где адская стезя, что делать можно, а чего нельзя, что душу кармой не порабощает.\n\n**4.18.** Кто видит как служенье Мне свой долг¹, служенье Мне как долг, тот знает толк в сужденьях. Средь людей он обладает разумностью великой, он живёт со Мной, хотя всегда дела ведёт.\n\n**4.19.** Кто действует без всякого стремленья от дел своих изведать наслажденье, тот знаньем совершенным овладел. И мудрые считают: в этом знанье он сжёг весь груз последствий прошлых дел.\n\n**4.20.** Он больше не имеет притязанья к плодам своих трудов, не знает мук. Всегда и всюду удовлетворённый, он трудится, не покладая рук, от рабства дел мирских освобождённый.\n\n**4.21.** Мудрец не ищет в мире ничего, своим умом и разумом владеет,\n\n**4.22.** не мнит себя хозяином того, что он по воле Господа имеет. Желая душу в теле поддержать, он только то для тела принимает, что нужно для служения принять, и так ни в чём греха не совершает. Кто тем доволен, что само собой приходит, кто от зависти избавлен, кто двойственностью мира не отравлен, кто сохраняет внутренний покой, всё обретая иль теряя всё, – тот от последствий дел своих спасён.\n\n**4.23.** Дела того, кто от влиянья пут материи уже освободился и в знанье трансцендентном¹ утвердился, кто посвящает только Мне свой труд, духовны. Карму² всех, кто так живут, всецело растворяет Абсолют.\n\n**4.24.** В их жизни всё: святой огонь, дары, что в жертву приносимы, – всё духовно. Стремясь ко Мне всем сердцем, безусловно, они войдут в духовные миры, ведь Мне отдали действия они.\n\n**4.25.** Есть йоги, чьи священные огни все подношенья их передают правителям вселенной. Но другие дары и подношения любые к огню Верховной Истины несут.\n\n**4.26.** Послушник неженатый отдаёт слух с жизнью прочих чувств огню смиренья. Тот, кто в семье воздержанно живёт, приносит звук, все формы наслажденья как жертву чувств огню служенья Мне.\n\n**4.27.** Кто истинное «Я» познать желает, порой деянья чувств своих сжигает,\n\n**4.28.** как и дыханье жизни, на огне смиренного ума. Так и другие сквозь жертвы к просветлению идут, когда своё богатство отдают, иль совершают подвиги благие, иль по ступеням йоги¹ вверх ползут, вникают в Веды ради обретенья духовных знаний. Все для просветленья свои обеты тщательно блюдут.\n\n**4.29.** Иные, чтоб однажды в транс войти, своим дыханьем овладеть желают, и воздух тот, который выдыхают, тому, который должен внутрь войти, приносят в жертву, и наоборот.\n\n**4.30.** В итоге йог дышать перестаёт и входит в транс. Другие, кто питанье сумели ограничить, отдают наружу исходящее дыханье ему же в жертву. Все, кто так живут и цель одну всех жертв и вправду знают, смывают с сердца все грехи. В свой час они, плодом усилий насладясь, миров духовных, вечных достигают.\n\n**4.31.** О, лучший в роде Куру, никогда любой, кто в жизни жертв не совершает, счастливым в этом мире не бывает, про мир иной что говорить тогда.\n\n**4.32.** Устами Вед Господь велел свершать все эти жертвы, что берут рожденье из действий. Суть всех жертв сумей понять и так ты обретёшь освобожденье.\n\n**4.33.** Узнай, врагов способный покорять, что жертвовать гораздо лучше, зная\n\n**4.34.** смысл жертв, чем просто собственность отдать. Но тем, кто отдаёт, не понимая, обряды сами будут помогать в итоге запредельное познать. Духовному учителю отдай всего себя, чтоб Истина открылась тебе, его смиренно вопрошай, служи ему, снискать желая милость. Способны те, кто дух постичь сумели, дать знанье, ибо Истину узрели.\n\n**4.35.** Коль Истину однажды обретёшь от осознавшего себя святого, ты в заблужденье снова не впадёшь и сможешь видеть связь всего живого с Душой всех душ. Как искорки в огне все существа увидишь ты во Мне.\n\n**4.36.** И даже если ты сейчас живёшь греховней всех злодеев мирозданья, на корабле божественного знанья ты океан невзгод пересечёшь.\n\n**4.37.** Арджуна, как пылающий костёр дрова в золу и пепел превращает, так знания огонь дотла сжигает всю карму¹, что копилась до сих пор.\n\n**4.38.** Нет в этом мире смерти ничего, что с этим знаньем в святости сравнится. В свой срок в себе почувствует его тот, кто в служенье Мне сумел добиться успеха. Так он вкусит йоги плод.\n\n**4.39.** Любой, кто с верой в Истину живёт, кто чувства обуздал и кто желает к духовному сознанию прийти, его уже достоин обрести. В тот час, когда его он обретает и понимает, кто же он такой, к нему приходит неземной покой.\n\n**4.40.** Но у невежд, не знающих писанья, не верящих в слова священных Вед, у тех, в ком есть сомненья, шансов нет достичь высот духовного сознанья. Им суждено всё ниже опускаться.\n\n**4.41.** Нет для души, привыкшей сомневаться, ни в этом мире счастья, ни в ином. Кто деятельность Богу посвящает, привязанность при этом отвергает к тому, что создал он своим трудом, кто знанием сомненья разогнал, тот истинное «Я» уже познал.\n\n**4.42.** Герой, способный мир завоевать, – его не могут действия связать. Поэтому меч знания возьми и в сердце разруби свои сомненья, берущие в невежестве рожденье. Путь йоги как оружие прими. Восстань, в словах Моих не сомневайся. Потомок рода Бхараты, сражайся!»"

      "title": "Глава 5. Карма-санньяса-йога",
      "content": "# **Глава 5. Карма-санньяса-йога**\n\n*Йога отречения от действия*\n\n---\n\n**5.1.** Арджуна молвил: «Действий отверженье Ты мне сначала рекомендовал. О Кришна, но затем Ты славить стал величье действий в преданном служенье. Прошу, ответь мне прямо на вопрос: что предпочесть?»\n\n**5.2.** Всевышний произнёс: «Отказ от дел иль действия в служенье, итог у них один – освобожденье. И всё же лучше Господу служить, чем просто, отрешась от действий, жить.\n\n**5.3.** Кто беспристрастным стал к плодам труда, кто их не любит и не презирает, считается ушедшим навсегда от мира. Он легко одолевает влияние сомнений, перемен, и, безусловно, покидает плен материи, Арджуна сильнорукий.\n\n**5.4.** Невежды только могут говорить, что йога тех, кто хочет Мне служить, и йога тех, кто мир путём науки пытается понять, – суть два пути. Но те, кто мудр воистину, считают: кто прямо лишь одним путём шагает, тот должен к цели двух в конце прийти.\n\n**5.5.** Кто осознал, что цели изученья достичь возможно с помощью служенья, кто понял, что служенье Мне и путь бесстрастного анализа творенья равны, по сути, тот увидел суть.\n\n**5.6.** Без преданности Богу отреченье одни несчастья может принести. Но мудрый, выбирая путь служенья, способен без тревог и промедленья достичь всего – к Всевышнему прийти.\n\n**5.7.** Кто в преданном служенье чист душой, кто управляет полностью собой, поскольку ум и чувства обуздал, тот дорог всем, и каждый дорог стал ему. Хотя такой герой всегда делами поглощён, он не бывает последствиями связан никогда,\n\n**5.8-9.** поскольку божьей милостью он знает, что, видя формы или слыша звук, касаясь разнообразных тел вокруг, иль запах ощущая, иль вкушая, шагая бодро, или засыпая, дыша, он сам не действует. Когда он говорит, кишечник облегчает и пищей вновь желудок наполняет, смыкает веки вновь и вновь, тогда он сознаёт, что сам он не при чём, что просто чувства временного тела к предметам восприятия влечёт.\n\n**5.10.** Кто выполняет собственное дело без жажды счастья от плодов труда, кто их всецело Богу посвящает, к тому грехи не липнут никогда, так лотос от воды не намокает.\n\n**5.11.** Такие йоги всё: свои тела, ум с разумом и даже ощущенья, – используют лишь ради очищенья и для Меня вершат свои дела, корысть отбросив.\n\n**5.12.** Истинный покой те преданные души обретают, которые всё время предлагают Мне действия свои и труд любой, а также результаты всех трудов. Но ждёт в грядущем лишь судьба рабов тех, кто союза с Господом лишён, кто к результатам дел своих стремится, желая не отдать, а насладиться.\n\n**5.13.** Когда отходит тот, кто воплощён, умом от действий тела, он живёт, собой владея, счастье ощущая, в обители средь девяти ворот¹, деяний никаких не совершая, да и причиной их не становясь.\n\n**5.14.** Душа в сознанье лишь имеет связь с тем телом, где она воплощена. По сути же не действует она, не побуждает действовать других, не создаёт плодов трудов своих. Деянья тел природа совершает, та, что из гун различных состоит.\n\n**5.15.** Всевышний никогда не отвечает (хотя природой Он руководит) за праведные действия и грех живых существ. Святое знанье тех, кто воплощён, невежеством покрыто и силою иллюзии забыто.\n\n**5.16.** Но, обретая знанье, существо невежества туман превозмогает. Свет знанья, словно Солнце, разгоняет ночную тьму, скрывавшую его.\n\n**5.17.** Кто разум, ум и веру с упованьем к Всевышнему направил целиком, тот, устранив грехи духовным знаньем, идёт к свободе радостным путём.\n\n**5.18.** Такой мудрец смиренный на других взирает равно, просветлённый знаньем. Учёный брахман с должным воспитаньем в его глазах не выше душ иных, что приняли тела коров, слонов, собак и тех, кто поедает псов.\n\n**5.19.** Достигшие спокойствия ума всё время беспристрастность проявляют.\n\n**5.20.** Послушны им и жизнь, и смерть сама. Они перерожденье побеждают. Чисты, как Бог, в сознании своём такие души пребывают в Нём. Кто отречён, не рад приобретенью того, что чувства может услаждать, и не подвержен также огорченью, когда в свой срок приходится страдать; кто в разуме невозмутим своём, кто действию иллюзий не подвластен, кто знает Бога, Богу сопричастен, – уже живёт духовным бытиём.\n\n**5.21.** Кто не привязан ни к чему мирскому, для чувств не хочет радостей искать. Познав себя, найдя в душе основу, он может счастье в сердце ощущать.\n\n**5.22.** Осознавая запредельный мир, на прочее умом не отвлекаясь, он помнит о Всевышнем каждый миг, так беспредельным счастьем наслаждаясь. Он сторонится всех мирских утех, союза чувств с объектами желанья. Разумный знает: в них живёт страданье. Конец, как и начало, есть у всех мирских страстей, сын Кунти, а мудрец не ищет счастья там, где есть конец.\n\n**5.23.** Кто в материальном теле научился смирять желанья чувств, и ум, и гнев, тот истинного счастья здесь добился, собою в совершенстве овладев.\n\n**5.24.** Кто счастье, наслажденье, бодрость смог черпать внутри себя и кто стремится лишь внутрь себя, тот совершенный йог: он дух постигнет, и освободится, и вскоре ко Всевышнему придёт.\n\n**5.25.** Освобожденье обретает тот, кто внутрь себя направить взор сумел,\n\n**5.26.** кто стал безгрешным, победил сомненья и действует живущим во спасенье. Тот, кто желанья, гнев преодолел, постиг себя, ум йогой обуздав, в ком к совершенству искренне стремленье, тот вскоре обретёт освобожденье, Верховный Брахман, Истину познав.\n\n**5.27-28.** Достичь его возможно, отрешившись от всех соблазнов мира, меж бровей держа свой взор и в области ноздрей остановив дыханье. Так, добившись покоя чувств, ума, йог укрощает, стремясь к освобожденью, разум свой, желанья, гнев и страхи побеждает. Тот стал освобождённою душой, кто это состояние всегда хранит и не теряет никогда.\n\n**5.29.** Тот полную свободу обретает от всех невзгод, страданий и сует и обретает в сердце мир, кто знает, что, кроме Кришны, Господина нет, что только Я, Шри Кришна, наслаждаюсь плодами жертв, аскез, что только Я превыше всех планет, богов, являюсь Верховным Властелином бытия. Я – благодетель и сердечный друг всех тех, кто населяет мир вокруг»."
    },

      "title": "Глава 6. Дхьяна-йога (Атма-самьяма-йога)",
      "content": "# **Глава 6. Дхьяна-йога (Атма-самьяма-йога)**\n\n*Йога самоконтроля (медитации)*\n\n---\n\n**6.1.** Всевышний произнёс: «Кто не привязан к плодам труда, но в труд свой погружён лишь потому, что действовать обязан, воистину от мира отрешён. Он – йог и впрямь в отличье от других, что жертвенных костров не зажигают и долга своего не выполняют.\n\n**6.2.** Сын Панду, знай: то, что в устах людских зовётся отречением, есть йога, связь со Всевышним, ибо йогом стать способен только тот, кто ради Бога отверг стремленье чувства услаждать.\n\n**6.3.** Тем, кто лишь начал йогой заниматься, нет смысла от деяний отрекаться: занятья, позы – средства на пути. Для тех, кто в этой йоге смог дойти до совершенства, средство – прекратить деянья материальные вершить.\n\n**6.4.** Считается, что совершенный йог – тот, кто корысть любую превозмог и перестал для чувств услад искать и действия мирские совершать.\n\n**6.5.** Душа подняться может до вершин, ум применяя, чтоб освободиться, а не к животной жизни опуститься, поскольку ум – и друг, и враг души.\n\n**6.6.** Ум, если он обуздан, – верный друг, а если нет, он – враг, источник мук.\n\n**6.7.** Герой, который ум свой обуздал и в умитворенье пребывает, уже Сверхдушу в сердце осознал. Её постигнув, он не замечает различий между стужей и жарой, бедой и счастьем, славой и хулой.\n\n**6.8.** Того, кто знанье Истины из книг извлёк, затем на практике постиг и в удовлетворенье пребывает, уже познавшим вечный дух считают. Он – йог. Он – мистик. Душу осознав, все чувства силой йоги обуздав, он видит равно слиток золотой, и гальку, и булыжник мостовой.\n\n**6.9.** Но превосходит мистиков таких тот йог, что равно видит остальных, будь это искренний доброжелатель, помощник, враг, сторонний наблюдатель, посредник иль завистник, или тот, кто друг, родня, кто праведно живёт, и даже тот, которому грешить уже привычно.\n\n**6.10.** Йог обязан жить, Всевышнему служа любой порой и телом, и умом, и всей душой. Он должен жить один в уединенье, держа всё время ум в повиновенье, и быть свободным и сейчас, и впредь от всех желаний чем-либо владеть.\n\n**6.11-12.** В святом, уединённом, чистом месте травою куша землю застелив, её оленьей шкурою покрыв и мягкой тканью, йогу нужно сесть и к работе над сознаньем приступить. Сиденье не должно высоким быть иль низким. Йогу нужно подчинить ум с чувствами и деятельность тела, все мысли на одном установить и от грехов очиститься всецело.\n\n**6.13-14.** Держа свой корпус, голову и шею устойчиво на линии одной, на кончик носа взгляд направив свой и впредь по сторонам глядеть не смея, ум успокоив, страх преодолев, обет безбрачья строго соблюдая, на образ Мой все мысли направляя,\n\n**6.11-12.** йог должен, в медитации воссев, Меня своею высшей целью сделать.\n\n**6.15.** Так, укрощая ум и плоть всегда, йог, что навеки ум свой обуздал, познав покой, выходит за пределы материи и обретает Мой духовный мир.\n\n**6.16.** Арджуна, царства Бога не достигает тот, кто слишком много ест или спит, кто ограничил свой сон и еду свою чрезмерно.\n\n**6.17.** Тот, кто в меру ест и в меру отдыхает, и кто трудом умеренным живёт, кто сну и остальному меру знает, способен настоящим йогом стать и больше в мире этом не страдать.\n\n**6.18.** Когда же ум у йога подчинён и чист от всех желаний наслаждаться, духовной сферы достигает он и может стойким в йоге называться.\n\n**6.19.** Как пламя лампы или же свечи горит без колебаний в тихом месте, так йог, который ум свой приручил, всегда живёт в сознанье с Богом вместе.\n\n**6.20-23.** Тот, кто такого транса достигает, уже умом от мира отстранён. Очищенным умом он понимает, что он – душа, и этим счастлив он. Он удовлетворённость обретает и чувствами духовными тогда духовное блаженство ощущает. Йог, Истину постигнув, никогда забыть её не может, для него не существует выше ничего. С Ней связан, он не знает колебаний перед лицом тягчайших испытаний.\n\n**6.24.** Вот полная свобода от невзгод, которые материя даёт. Так что же нужно тем, кто занят йогой? Решимостью и верой обладать и неуклонно выбранной дорогой идти вперёд и цель не забывать. Необходимо все без исключенья желанья материальные изжить, те, что в уме всегда берут рожденье, затем умом все чувства подчинить.\n\n**6.25.** За шагом шаг йог должен постепенно свой разум твёрдой верой укрепить и с помощью него установить ум на душе, и думать неизменно лишь о душе, уйдя от прочих дум.\n\n**6.26.** Куда бы ни стремился буйный ум, изменчивый, метущийся, нестойкий, его всё время нужно возвращать под власть души.\n\n**6.27.** Кто может размышлять умом спокойным о Всевышнем только, в блаженстве достигает тех высот, где вне влиянья страсти сознаёт, что он – брахма́н, духовная частица. Ему то знанье позволяет враз от всех следов греха освободиться.\n\n**6.28.** Так, с Высшею Душой имея связь, всю скверну йог из сердца устраняет, служа с любовью Господу всегда, он высшее блаженство обретает.\n\n**6.29.** Во всех живущих видит он тогда Меня, а всех живых существ – во Мне. Кто связью со Всевышним обладает, единую Сверхдушу созерцает везде: внутри всего или вовне.\n\n**6.30.** Тот, кто Меня повсюду созерцает и также видит всё во Мне всегда, тот никогда Меня не потеряет, и Я не потеряю никогда его.\n\n**6.31.** Он служит Мне, он предаётся Мне, скрытому в сердцах у всех живых существ. При обстоятельствах любых во Мне такой подвижник остаётся.\n\n**6.32.** Сопоставляя каждого с собой, он равно видит всех в беде, в блаженстве. Считается, что человек такой постиг, Арджуна, йогу в совершенстве».\n\n**6.33.** Арджуна молвил: «Мне не хватит сил, чтобы достичь успеха в сложной йоге, которую Ты вкратце объяснил, мой буйный ум взбунтуется в итоге.\n\n**6.34.** О Кришна, ум изменчив и упрям, он беспокоен. Кто его сильнее? Мне кажется, смирить его труднее, чем даже противостоять ветрам».\n\n**6.35.** Всевышний так ответил: «Несомненно, ум беспокойный трудно обуздать, тут мало силой тела обладать, сын Кунти, впрочем, если постепенно себя от удовольствий оградить, ум можно отреченьем подчинить.\n\n**6.36.** Познать себя, свой ум не обуздав, Я думаю, невероятно сложно. Но, ум смирив и верный путь избрав, достичь успеха всё-таки возможно».\n\n**6.37.** Арджуна молвил: «Если всё же йог, который с верой шёл дорогой йоги, достичь успеха высшего не смог и с этого пути сошёл в итоге, чего же, Кришна, достигает он?\n\n**6.38.** Могучерукий, разве, отклонившись и всякого прибежища лишившись, идти не в силах избранным путём,\n\n**6.39.** не исчезает он, утратив всё, разорванному облаку подобен? Сомненье это муки мне несёт. Рассей его, прошу. Лишь Ты способен, о Кришна, от сомнений исцелить».\n\n**6.40.** Всевышний произнёс: «Не может быть, сын Притхи, чтобы даже падший йог утратить достиженья йоги смог при этой жизни или же потом. Мой друг, тот, кто идёт благим путём, для Бога не погибнет, несомненно. Добро творящий добр средь зла и бед.\n\n**6.41.** Подобный йог достигнет непременно планет благочестивых. Много лет он будет райской жизнью наслаждаться, затем родится в доме у людей великих в добродетели своей, чтоб с детства с добродетелью общаться,\n\n**6.42.** иль в доме тех, кто знатен и богат. Кто прежде глубоко освоил йогу, рожденье примет в доме тех, кто свят, кто очень мудр и в сердце служит Богу. Среди людей подобное рожденье, конечно же, – редчайшее везенье.\n\n**6.43.** В такой семье он с детства пробуждает духовный разум, тот, что он развил в прошедшей жизни, дальше продолжает свой путь, который он не завершил, стремится вновь достичь вершин сознанья, потомок Куру.\n\n**6.44.** Безусловно, в нём само собой рождается желанье опять идти божественным путём, которым шёл в минувшем воплощенье. Он жаждет дух воистину познать и Бога полюбить. В нём нет стремленья корыстные обряды совершать.\n\n**6.45.** Он искренне усилья прилагает в занятьях йогой и, в конце концов, спустя немало жизней очищает себя от всей корысти и грехов.\n\n**6.46.** Он совершенство духа обретает и высшей цели йоги достигает. Йог много выше, чем аскет, мыслитель, иль человек, желающий вкушать плоды трудов, иметь в Раю обитель. Арджуна, ты обязан йогом стать.\n\n**6.47.** Всех йогов лучше тот, кто размышляет всегда, что в храме сердца Кришна – Бог, кто нерушимой верой обладает, с любовью Мне служенье предлагает. Я думаю, он – величайший йог»."

      "title": "Глава 7. Джнана-виджняна-йога",
      "content": "# **Глава 7. Джнана-виджняна-йога**\n\n*Йога знания об Абсолюте (познание истины)*\n\n---\n\n**7.1.** Господь сказал: «Послушай же о том, как Мне себя вручив, свой ум направив лишь на Меня, сомненья все оставив, идя ко Мне описанным путём, сын Притхи, сможешь ты Меня понять.\n\n**7.2.** Я полностью тебе открою знанье о временном и вечном мирозданье. Им овладев, ты больше постигать не должен будешь в мире ничего. Тебе все тайны поспешат открыться.\n\n**7.3.** Кто к совершенству этому стремится? Из тысяч вряд ли сыщешь одного такого. А из тех людей, кто стал достигшим совершенства, вряд ли даже один Меня воистину познал.\n\n**7.4.** Земля, вода, огонь и воздух, также эфир, ум, разум, временное «я», – вот части материального творенья. Их восемь. Все они в соединенье – материя, энергия Моя.\n\n**7.5.** Всё время от Меня отделена, всегда во всём подвластна Мне она. Она как прах, тот, что у ног лежит. Но знай, что сила есть иного рода, Моя другая, высшая природа, что из частичек духа состоит. Они, о скрывший мощь в своих руках, используют для жизни этот прах.\n\n**7.6.** Из этих двух природ берут начало все существа. Знай, что во Мне есть всё: то, из чего творенье возникало, и то, что разрушение несёт всему, что происходит в свой черёд из единенья этих двух природ.\n\n**7.7.** О ты, земель богатых покоритель, Меня превосходящей силы нет. Всё сущее покоится на Мне, как жемчуга покоятся на нити.\n\n**7.8.** Я – вкус воды, сын Кунти, Я – сиянье Луны и Солнца, Я – священный слог «ом» в мантрах Вед, в эфире Я – звучанье, способность в тех, кто стать способным смог.\n\n**7.9.** Я – аромат земли, что изначален, Я – жар огня, Я – жизнь во всех живых, Я – аскетизм в подвижниках любых.\n\n**7.10.** Сын Притхи, знай, Я – семя, что в начале предшествует всем формам бытия, Я – разум мудрых, мощь могучих – Я.\n\n**7.11.** Я – сила сильных, чистая от страсти и похоти, Я – половая жизнь, но нет, не та, что у греха во власти, а та, что может Богу послужить, о вождь царей.\n\n**7.12.** Любое состоянье, возможное в пределах бытия, будь это благость, страсть иль тьма незнанья, всегда творит энергия Моя.\n\n**7.13.** Я – всё, но отстранён одновременно от всех творений мира. Знай, Я вне влиянья гун, напротив, неизменно они всегда, во всём подвластны Мне. Весь этот мир, введённый в заблужденье игрой трёх гун, не ведает о том, кто Я, стоящий выше гун творенья и беспредельный в бытии Своём.\n\n**7.14.** У этих гун божественная мощь. Мою природу трудно превозмочь. Лишь тот, кто Мне себя вручить сумеет, легко её покров преодолеет.\n\n**7.15.** Но в грешниках рассудка очень мало. В своих трудах полнейшие глупцы, безбожники и горе-мудрецы, чьи знания иллюзия украла,\n\n**7.16.** и демоны, злонравные всегда, Мне душу не вручают никогда. Четыре типа праведных людей служеньем Мне решают заниматься: страдающий, желающий богатства, любитель знаний, тот, кто суть вещей постиг и только Истины желает, о лучший среди Бхарат.\n\n**7.17.** А из них тот, совершенный в знаниях своих, который постоянно занимает себя служеньем Мне, ничем иным, тот превзошёл, конечно же, любого. Я очень дорог для слуги такого, Я очень дорожу слугой таким.\n\n**7.18.** Сомнений нет, все, кто ко Мне стремятся, возвышенны, но Я скажу о том, кто в полном знанье Мне решил предаться. Лишь он один подобен Мне во всём: он ничего не просит, несомненно, ни рая, ни свободы он не ждёт. Лишь из любви служа Мне, непременно ко Мне, заветной цели, он придёт.\n\n**7.19.** Подобного успеха достигает тот, кто рожденья многие прошёл и знанье совершенное обрёл. В конце концов, он Мне себя вручает, поняв, что Кришна – всё, что Я один – Господь всего, причина всех причин.\n\n**7.20.** Махатма¹ – тот, кто это смог понять. Его непросто в мире повстречать. Других желанья многие влекут и разум их и знанье расхищают. Такие люди головы склоняют к стопам богов вселенной и живут\n\n**7.21.** так, как, согласно мудрым Ведам, надо жить людям их природы и уклада. Как Высшая душа, Я наблюдаю желанья всех существ во всех сердцах. В тех людях, что нашли в полубогах прибежище, Я веру укрепляю в желанных им полубогов.\n\n**7.22.** Затем, имея вдохновенье поклоняться полубогам, те люди без проблем желанного способны добиваться.\n\n**7.23.** Но блага через всех полубогов дарую Я один в конце концов. Те блага – прах, недолговечный плод, глупцов достойный. Тот, кто поклонялся полубогам, к полубогам идёт, но тот, кто служит Мне, кто Мне предался, идёт в обитель высшую Мою. Я каждому по вере воздаю.\n\n**7.24.** Глупцы, невежды думают, что Я, Всевышний, Кришна, прежде был безличным, что Я являюсь существом обычным. Духовного не зная бытия, они считают тело Бога бренным.\n\n**7.25.** Но Я являюсь высшим и нетленным. Как таковой Я не открыт для всех. Энергия духовная скрывает Меня от оскорбителей и тех, кто глуп. Никто из них не понимает, что Я, хоть и рождаюсь, не рождён, неисчерпаем и непревзойдён.\n\n**7.26.** Иллюзия Меня не покрывает. Я знаю всё, что делалось в былом, всё, что сейчас твориться продолжает, и всё, что будет делаться потом, Арджуна. Я же знаю всех живых существ, но Я – непознанный для них.\n\n**7.27.** Они живут, увы, в таком незнанье с тех пор, как появились в мирозданье. О Бхарата, любое существо в иллюзию, рождаясь, попадает. Иллюзия, сомненья возникают, о покоритель мира, оттого что есть желанье, как и отвращенье.\n\n**7.28.** Но тот, кто все грехи в себе изжил, кто много жизней благо всем дарил, тот побеждает двойственность, сомненья, иллюзию; решимость обретает и Мне своё служенье посвящает.\n\n**7.29.** Такие люди разум обрели. Желая обрести освобожденье от старости, от смерти и рожденья, они во Мне прибежище нашли. Они уже себя со Мной связали, они – суть дух по качествам своим, поскольку в совершенстве осознали, что в царстве духа нужно делать им.\n\n**7.30.** Кто обо Мне всё время размышляет, кто понял: Кришна – Высший Господин, который мирозданьем управляет, Господь полубогов и Властелин всех жертв, – тот будет даже в смертный час поддерживать со Мной в сознанье связь»."
    },
