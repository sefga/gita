      "title": "Глава 8. Акшара-брахма-йога",
      "content": "# **Глава 8. Акшара-брахма-йога**\n\n*Йога достижения вечного Брахмана*\n\n---\n\n**8.1.** Арджуна молвил: «Высший Господин, Ты – Личность Бога и неоспорим. Скажи, что нужно Брахманом считать. Поведай, что считаешь Ты душою и что уместно кармой называть. Весь космос, боги, – что это такое? Вопросы эти освети сполна.\n\n**8.2.** Скажи ещё, о Мадхусудана, кто есть Господь всех жертв? Как Он живёт в телах существ? Развей мои сомненья. Как, встретив смерть, Тебя познает тот, кто шёл к Тебе дорогами служенья?»\n\n**8.3.** Господь сказал: «Живое существо неразрушимо и трансцендентально. Его сознанье индивидуально и вечно. Я душой зову его. А кармой называются дела, которые душа осуществляет, когда плодов и выгоды желает, себе готовя новые тела.\n\n**8.4.** О лучший из родившихся в телах, всегда меняясь, превращаясь в прах, творение материей зовётся. Вселенная со множеством миров в себя включает всех полубогов, таких как божества Луны и Солнца. Я, Сверхдуша в сердцах у всех живых существ, что в этом мире изменений родились в формах временных своих, – Господь, Владыка жертвоприношений.\n\n**8.5.** Кто на исходе жизни, умирая, навек темницу тела покидая, всем сердцем помнит обо Мне одно, немедля возвращается в Мой дом, в Мою природу. Это несомненно.\n\n**8.6.** О чём бы человек, свой путь пройдя, ни вспоминал, из тела уходя, подобного достигнет непременно.\n\n**8.7.** Поэтому повсюду и всегда, Арджуна, помни обо Мне, сражайся. Мне посвяти себя и никогда от мыслей обо Мне не отвлекайся, и ум, и разум посвящай Мне. Так, несомненно, ты придёшь ко Мне.\n\n**8.8.** Сын Притхи, тот, кто помнит всякий раз Всевышнего, сосредоточась в йоге, в сознанье с Ним поддерживает связь, не отвлекаясь, Господа в итоге достигнет непременно.\n\n**8.9.** Думай так: Всевышний – тот, кто всё на свете знает, кто старше всех, кто всеми управляет. Мельчайший, Вседержитель, Он никак не постижим рассудком материальным. Как Солнце ослепителен, всегда Он остаётся тем трансцендентальным, в чьей форме нет материи следа.\n\n**8.10.** Кто жизненную силу, умирая, сумеет удержать промеж бровей, и силой йоги, мыслью не блуждая, предастся Богу всей душой своей, тот, несомненно, к Личности Верховной придёт в Его обители духовной.\n\n**8.11.** Знаток всех Вед, произносящий «ом», и тот, кто стал великим мудрецом, который в отреченье пребывает, – божественного света достигает. Стремящийся к такому положенью обеты воздержания даёт и в полном целомудрии живёт.\n\n**8.12.** Я расскажу про путь освобожденья. Условия для йоги таковы: от скверны чувств врата хранятся строго, весь ум сосредоточен в сердце йога, а прана – в верхней части головы.\n\n**8.13.** В такое состояние войдя, священный «ом» при этом повторяя и обо Мне, Всевышнем, вспоминая, достигнет йог, из тела уходя, обители духовной, несомненно.\n\n**8.14.** Любой, кто помнит обо Мне всегда, кто неуклонен в этом, без труда Меня достигнет, Партха, непременно, поскольку постоянно служит Мне.\n\n**8.15.** Вершин достигнув в преданном служенье, махатмы возвращаются ко Мне, чтоб не изведать больше возвращенья в мир, полный боли, где не вечно всё.\n\n**8.16.** Любое место в нём (и Брахмалока) страданья обитателям несёт. Рождаясь здесь, они живут до срока, встречают смерть, рождаются опять. Но кто в Мою обитель попадает, сын Кунти, тот уже не испытает рождения, не будет умирать.\n\n**8.17.** День Брахмы равен тысяче земных эпох. Ночь Брахмы столь же долго длится.\n\n**8.18.** И всякий раз в начале дней таких живым созданьям должно проявиться, чтоб днём свои мечты осуществлять, а ночью в непроявленность вернуться.\n\n**8.19.** Так вновь и вновь им нужно продолжать: уснуть в ночи и днём опять проснуться, уничтоженье ночью пережить, а днём существованье проявить.\n\n**8.20.** Природа… За пределами её, проявлена она или незрима, есть высшее, иное бытиё. Нетленно, вечно и неразрушимо, оно не попадает к смерти в плен в отличие от мира перемен.\n\n**8.21.** Что Веды непроявленным зовут, непогрешимым, высшим назначаем, конечный пункт, обитель и приют, откуда не бывает возвращенья – Мой высший мир.\n\n**8.22.** Верховный Господин, Всевышний Бог, никем не превзойдённый, беспримесным служеньем достижим. Внутри Него весь космос сотворённый. Всегда живя в обители своей, Он вездесущ.\n\n**8.23.** О лучший из царей, о Бхарата, теперь скажу Я слово о тех моментах времени, когда йог может мир покинуть навсегда или уйти, чтоб возвратиться снова.\n\n**8.24.** Любой, кто высший Брахман осознал, Его достигнет, если покидает сей бренный мир, когда преобладает влиянье Агни, светлый час настал и если время дня благоприятно, или ещё когда луна растёт и если Солнце севером идёт шесть месяцев.\n\n**8.25.** Но йог придёт обратно, покинув мир в туманной норой порой, когда луна на небе убывает, а Солнце ходит южной стороной. Так мистик после смерти достигает Луны, чтоб вновь на Землю возвратиться.\n\n**8.26.** Согласно мненью Вед, есть два пути, чтоб духу из материи уйти: при свете и во тьме. Кому случится уйти при свете, снова не придёт, а кто уйдёт во тьме, назад вернётся.\n\n**8.27.** Кто в преданности Господу живёт, тот ни одним из них не увлечётся, хотя и знает эти два пути.\n\n**8.28.** Арджуна, твёрдым будь и обрети уверенность и Мне служи всегда. Мой бхакта не теряет никогда всех тех плодов, что могут принести познанье Вед, аскезы, жертвы, милость, и все труды, какие доводилось ему на благо всех произвести. Он получает прочих действий плод, когда всего лишь с преданностью служит Всевышнему и, жизнь прожив, к тому же уходит в вечный мир, где Бог живёт»."

    "chapter-9.json": {

      "title": "Глава 9. Раджа-видья-раджа-гухья-йога",
      "content": "# **Глава 9. Раджа-видья-раджа-гухья-йога**\n\n*Йога царственного знания и сокровенной тайны*\n\n---\n\n**9.1.** Всевышний произнёс: «Ты не питаешь, Арджуна, чувства зависти ко Мне и потому из уст Моих узнаешь ту тайну, что сокрыта в глубине сердец Меня познавших мудрецов, в их опыте. Когда её узнаешь, ты сбросишь груз иллюзии – оков, из-за которых ты сейчас страдаешь.\n\n**9.2.** То знанье, что тебе открою Я – царь знанья, царь тайн, цель изученья, чистейший, высший смысл бытия. Оно дарует опыт постиженья души и потому оно – закон для всех религий и для всех времён. Незыблемо и вечно это знанье, и радостно его переживанье.\n\n**9.3.** Те, кто не верят в вечное служенье, пусть даже внешне служат иногда, достичь Меня не смогут никогда. Поэтому их ждёт лишь возвращенье в круговорот рождений и смертей, в самсару, царство временных путей.\n\n**9.4.** Мной, в форме сил невидимых Моих, пронизано всё это мирозданье. Все существа во Мне, но Я не в них.\n\n**9.5.** Но в то же время их существованье проходит вне Меня, само собой. Смотри на чудо Моего правленья! Все существа, весь мир хранимы Мной, но Я – не часть существ или творенья, Я – их источник.\n\n**9.6.** Ветер в вышине всё время остаётся, всюду дуя. Так и созданья, всюду существуя, по-прежнему находятся во Мне.\n\n**9.7.** Когда великий Брахма умырает, закончив жизнь столетнюю свою, все те, кто этот космос населяют, с ним вместе погружаются в Мою природу. Мирозданье исчезает. Я после вновь творю сей мир, когда начало новой калпы наступает.\n\n**9.8.** Творя весь космос, Я вхожу туда, энергией Своей повелеваю. Послушный Мне, весь этот мир живёт и вновь и вновь себя воссоздаёт, и гибнет вновь, когда Я пожелаю.\n\n**9.9.** Меня всё это не порабощает, о Дхананджая. Я как будто вне природы той, что космос созидает, Я словно наблюдаю в стороне.\n\n**9.10.** Всё время находясь под наблюденьем Моим, природа действует, творя подвижных и живущих без движенья. Энергии Моей благодаря мир действует, сын Кунти, раз за разом рождаясь, чтобы умереть в конце.\n\n**9.11.** Чтоб осознать всё это, нужен разум. Глупцы глядят с усмешкой на лице на облик Мой, что им напоминает тела людей. Увы, того, что Я – Верховный повелитель бытия, Нетленный, Высший дух, они не знают.\n\n**9.12.** Всё время пребывая в заблужденье, с безбожной верой демонов в сердцах такие люди вечно терпят крах в своих надеждах на освобожденье, в своих мечтах в миру преуспевать, в потугах тщетных Истину познать.\n\n**9.13.** Но те, сын Притхи, кто велик душою, идут под Мой божественный покров. Они в уме всегда живут со Мною, Мне отдают служенье и любовь, поскольку хорошо известно им,\n\n**9.14.** что Я – Всевышний, Господин творенья, и Я – источник, что неистощим. Всё время пребывая в прославленье Моих святых имён, духовных тел, нематериальных, трансцендентных дел, с решимостью служа Мне, предо Мною склоняясь низко, все они живут и Мне хвалу всё время воздают, любя Меня любовью неземною.\n\n**9.15.** Другие, те, чья жертва в обретенье премудрости и знаний состоит, Мне предлагают также поклоненье. Из них одним единство с Богом льстит (они себя считают также Богом), другие видят Господа во многом, они полубогам дары несут. А третьи материальный космос чтут. Любовь к вселенной для людей таких превыше поклонений остальных.\n\n**9.16.** Но Я – обряд и жертвоприношенье, что Веды предписали проводить, и Я – ушедшим предкам подношенье, и Я – трава, что может исцелить, Я – мантра, звук, который очищает, Я – масло, что в костёр священный льют, Я – то, что в жертву Истине несут, и Я – огонь, что жертву поглощает.\n\n**9.17.** Отец и мать Вселенной – это Я, и Я – её опора и хранитель, и Я – её древнейший прародитель, и Я же – цель познанья бытия, Я – то, что очищает, Я – слог «ом», Я – звук всех Вед, их суть во Мне одном.\n\n**9.18.** Я – цель путей, хранитель, повелитель всех сил природы, всех миров вокруг. Я всюду, Я – свидетель, Я – обитель, прибежище и самый близкий друг.\n\n**9.19.** Я – созиданье, Я же – разрушенье, Я – твёрдая основа бытия, и Я же – место для успокоенья, и вечная причина – тоже Я. Арджуна, это Я тепло дарую, даю дожди и прекращаю их. И это Я – бессмертье всех живых, и это Я над миром торжествую как смерть. Во Мне материя и дух. Я – совокупность, не одно из двух.\n\n**9.20.** Те знатоки, что Веды изучают и сладостный напиток сома пьют, Мне поклоненье также предлагают, надеясь, что в итоге попадут однажды в Рай. Омывшись от грехов, они идут в небесную обитель, где правит Индра, Рая повелитель, и там вкушают радости богов.\n\n**9.21.** Изведав тех небесных наслаждений и благочестья исчерпав запас, они из Рая падают тотчас на землю, в царство смерти и рождений.\n\n**9.22.** Вот вся награда для героев тех, которые три Веды почитают, желая только чувственных утех. Они лишь смерть с рожденьем получают. Но тем, кто, не ища других господ, всегда в полнейшем сосредоточенье Мне должное свершают поклоненье, Я то, чего им так недостаёт, даю, а что имеют, сохраняю. Они желают видеть образ Мой. Они служеньем связаны со Мной.\n\n**9.23.** Их, бескорыстных, Сам Я защищаю. Те, кто свершают с верой поклоненье полубогам, разумны не вполне. Они на деле служат только Мне,\n\n**9.24.** но предлагают косвенно служенье, совсем не так, как должно, Кунти сын. Однако, безусловно, Я один – единственный хозяин наслаждений от совершенья жертвоприношений. Я – Господин всех жертв и их плодов, но те, кто не познал, что Я таков, обречены всё время на паденье в пучину материального творенья.\n\n**9.25.** И какова цена всех их трудов? Кто божествам вселенной поклонялся, рождается среди полубогов. Кто предков удовлетворить старался, идёт в обитель предков, кто служил различным духам или привиденьям, рождается средь них. Но кто служенье и жизнь свою к стопам Моим сложил, ко Мне вернётся, чтоб со Мною жить.\n\n**9.26.** Достаточно с любовью предложить листок, цветок, плод, воду для питья, чтоб непременно это подношенье любви духовной тотчас принял Я от тех, в чьём сердце нету оскверненья.\n\n**9.27.** А впрочем, чем бы ты ни занимался, что б ты ни ел и что б ни предлагал, что б ни дарил и что б ни отдавал, какой бы ты аскезе ни предался, твори всё это, словно подношенье Мне, Кунти сын.\n\n**9.28.** Ты сбросишь груз оков плохих и добрых дел и их плодов, в служенье Мне найдя освобожденье. Сосредоточив ум на Мне одном, трудясь всё время в духе отреченья, достигнув высших форм освобожденья, ты вновь придёшь ко Мне, в свой вечный дом.\n\n**9.29.** Хоть Я и равно отношусь ко всем, без ненависти, как и без пристрастья, Я, несомненно, много ближе к тем, кто в преданности Мне находит счастье. Я дорог им. Они – мои друзья. Они во Мне живут. В их сердце – Я.\n\n**9.30.** И даже если тот, кто служит верно Мне лишь затем, чтоб быть Моим слугой, порой падёт или поступит скверно, то следует считать, что он святой, поскольку цель его – всегда идти с решимостью по верному пути.\n\n**9.31.** Он быстро добродетель обретает и вечный мир, что трудно достижим. Сын Кунти, смело заявляй другим, что тот, кто предан Мне, не погибает, ведь, даже ошибаясь иногда, он остаётся предан Мне всегда.\n\n**9.32.** Сын Притхи, не имей и в том сомненья, что, Мне вручая жизнь свою навек, все, даже люди низкого рожденья, торговец ли, рабочий человек, иль женщина, – все могут обрести Мой высший мир, цель своего пути.\n\n**9.33.** Коль цель доступна для простых людей, не очень-то разумных и успешных, что говорить про брахманов безгрешных, про тех, кто предан Мне, и про царей, чьи праведность и святость велики природе материальной вопреки.\n\n**9.34.** И потому, коль ты родился в бренной, несчастной, полной горечи вселенной, всего себя на жизненном пути служенью Мне с любовью посвяти. Все мысли направляй на образ Мой, стань предан Мне и всё своё служенье Мне посвящай, склоняйся предо Мной. Ты, в этом полном сосредоточенье служа Мне телом, речью и умом, придёшь ко Мне, в свой изначальный дом»."

      "title": "Глава 10. Вибхути-йога",
      "content": "# **Глава 10. Вибхути-йога**\n\n*Йога божественных достояний (Великолепие Абсолюта)*\n\n---\n\n**10.1.** Всевышний молвил: «Слушай, милый друг Арджуна, обладатель сильных рук, тебе Я дальше знанье излагаю, поскольку лишь добра тебе желаю. Та истина, что с уст Моих сойдёт, всё, сказанное прежде, превзойдёт.\n\n**10.2.** Ни полубоги, что повелевают делами этих временных миров, ни величайшие из мудрецов богатств Моих воистину не знают, ведь Я – первопричина всех богов, а также величайших мудрецов.\n\n**10.3.** Средь смертных только тот, кто понимает, что Я рожденья никогда не знал, что Я – Господь, начало всех начал, которого никто не зачинает, и Высший повелитель всех планет, тот вне иллюзий и греха в нём нет.\n\n**10.4.** Способность видеть суть любых явлений, материю от духа отличать, свобода от иллюзий и сомнений, терпимость и умение прощать, способность правду говорить открыто, ум с чувствами всегда держать в узде, умение счастливым быть везде, способность горевать, что в людях скрыта, рожденье, смерть, бесстрашие и страх, свобода от насилья, просвещенье, свобода от приязни, отвращенья, несуетность в желаньях и делах, идущая от удовлетворенья, способность добровольно налагать на ум и плоть свою ограниченья, уменье с чистым сердцем отдавать, известность, тем лишь верная на деле, что Мне верны в желаниях своих, бесславие рождённых в бренном теле, –  \n[Стих 10.5 отсутствует в предоставленных изображениях]\n\n**10.6.** обилье качеств всех существ живых лишь Я один однажды порождаю и в разнообразных формах проявляю. Семь величайших мудрецов творенья, а прежде них и четверо других, а также Ману, приняли рожденье из Моего ума, затем от них родились все, кто космос населяют.\n\n**10.7.** Кто этот факт действительно постиг, кто мощь Мою мистическую знает и красоту Мою, тот в сей же миг в любовном чистом преданном служенье прибежище находит, нет сомненья.\n\n**10.8.** Я – истинный источник всех миров. Всё – из Меня, всё Мной одним творится. И те, в ком это знанье утвердится, воистину, – пример для мудрецов.\n\n**10.9.** Они в глубоком сосредоточенье Мне отдают свой труд и поклоненье. Все мысли их, вся жизнь посвящены лишь Мне. В полнейшем удовлетворенье они всегда лишь тем поглощены, что говорят друг другу о служенье и, хоть в собранье, хоть наедине, беседуют в блаженстве обо Мне.\n\n**10.10.** Им, занятым всегда служеньем Мне, охваченным любовью безусловной, даю Я разум истинный, духовный, что помогает им прийти ко Мне.\n\n**10.11.** Я жажду дать им милость как подарок, Я в их сердцах всегда и потому светильником, в котором очень ярок луч знаний, Я рассеиваю тьму, что в их сердцах неведенье рождает. Их Истина нигде не покидает».\n\n**10.12-13.** Тогда Арджуна так ответил Кришне: «Ты – Истина верховная, Всевышний, конечная духовная обитель, чистейший, наивысший повелитель, Ты – Личность, из которой всё исходит, Ты вечный Бог, начало всех начал, Тебя, Господь, никто не порождал, как и никто Тебя не превосходит в величии. Все мудрецы творенья, – сам Нарада с Аситой среди них, Девала, Вьяса, множество других, – мне также подтверждали это мненье, что я имею о Тебе, Шри Кришне, теперь Ты Сам об этом говоришь мне за мудрецами этими вослед.\n\n**10.14.** Так знай, что у меня сомнений нет, всё то, что Ты сказал, я принимаю и сокровенной Истиной считаю. Ни демонам, ни райским божествам постичь Тебя, Всевышний, невозможно.\n\n**10.15.** Воистину, лишь для Тебя не сложно знать Самому Себя. И вот Ты Сам, Верховный совершенный Господин, исток всего, владыка всех созданий, Господь богов, творенья властелин, владеешь всею полнотою знаний о том, кто Ты\n\n**10.16.** Всё, чем Ты обладаешь, величье сил божественных Твоих, которыми Ты всюду проникаешь, достойно, чтобы рассказать о них.\n\n**10.17.** Пожалуйста, поведай целиком о том, как пребываешь Ты во всём. Тебя как Личность не воспринимая, Твой вечный образ в мире забывая, как может человек Тебя познать? Ты скрыт своей мистической завесой. Что мне должно быть о Тебе известно, чтоб думать о Тебе и вспоминать\n\n**10.18.** Тебя, увидев только отраженье Твоё в просторах бренного творенья? Всевышний, это знанье мне открой, чтоб я повсюду помнил образ Твой. О Ты, способный каждому помочь в любви Тебе, Джанардана, предаться, вновь опиши мистическую мощь Свою и опиши Свои богатства подробно. Не приносит пресыщенья живой нектар Твоих бессмертных слов, дающих сердцу столько наслажденья. Тебя я слушать вновь и вновь готов».\n\n**10.19.** Шри Кришна, Властелин всего вокруг, сказал: «О да, Я расскажу, Мой друг, о достояньях и богатствах личных, в которых сила дивная Моя, но лишь о главных, ибо безграничны те формы, в коих проявляюсь Я.\n\n**10.20.** О друг Арджуна, победивший сон, Я – Высшая душа, что пребывает в сердцах у всех, кто в теле воплощён, Я – Тот, кто всё в творенье начинает, Я – середина, Я же – окончанье всего, что существует в мирозданье.\n\n**10.21.** Я – Вишну средь Адитьев, из светил Я – Солнце, преисполненное света, средь тех, кто управляет силой ветра Я – Маричи, который подчинил все ветры, Я – Луна средь звёзд.\n\n**10.22.** Из Вед Я – «Сама-веда», средь богов небесных Я – Индра, повелитель тех планет, которые везде как Рай известны. Из чувств Я – ум, в любом живом созданье Я – сила жизни или же сознанье. (Материя сознанье не рождает).\n\n**10.23.** Из Рудр Я – Шива, что повелевает забвеньем вечной красоты Моей, средь ракшасов и якшей Я – Кувера, господь богатств и райский казначей, средь Васу Я – огонь, средь гор Я – Меру.\n\n**10.24.** Арджуна, знай: среди жрецов Я – главный, Брихаспати. Средь тех, кто в бой ведёт войска, Я – Сканда, Карттикея славный, Я – океан среди вместилищ вод.\n\n**10.25.** Среди великих мудрецов творенья Я – Бхригу, среди звуков Я – звук «ом», средь жертвоприношений – повторенье святых имён. Я в имени Своём. Средь тех, кто неподвижен постоянно, Я – Гималаи, горная страна.\n\n**10.26.** Средь всех деревьев, коими полна природа мира, в облике баньяна Я предстаю. Из многих мудрецов, прославленных среди полубогов, Я – Нарада, среди гандхарвов Я – искусный Читраратха, Я – Капила средь тех, чьи мудрость, праведность и сила достигли совершенства бытия.\n\n**10.27.** Я – конь Уччайхшрава средь скакунов, узри – Я из нектара появился, когда весь мир к бессмертию стремился. Я – Айравата, главный средь слонов, которые в Раю других сильней, Я – повелитель, царь среди людей.\n\n**10.28.** Я – молния из тех, кто сокрушает на поле битвы множество врагов, а также Я – сурабхи средь коров, Я – Бог любви средь тех, кто побуждает мужчин и женщин зачинать детей, и Я – Васуки среди великих змей.\n\n**10.29.** Я из многоглавых змеев, или нагов, Я – самый удивительный – Ананта, средь многих обитателей воды Я – повелитель всей её среды, Вару́на, а средь предков Я – Арьяма,\n\n**10.30.** средь судей Я – Бог смерти, то есть Яма. Средь демонов, что космос населяют, Я – преданный Всевышнему Прахлад. Я – время средь всего, что разрушает, среди зверей Я – тот, пред кем хотят другие пасть, как перед Индрой, ниц: Я – лев и Я – Гару́да, царь всех птиц.\n\n**10.31.** Я – ветер среди тех, кто очищает, Я – Ра́ма средь оружие несущих, средь рыб Меня акулой называют, а также Ганга среди рек текущих.\n\n**10.32.** Арджуна, Я – начало и конец, а также середина всех созданий, Я – знанье о душе средь видов знаний, для логиков Я – доводов венец, что к Истине конечной призывает.\n\n**10.33.** Из букв, что алфавит в себя включает, Я – буква «А», из многих сложных слов Я – то, что состоит из двух основ. Я – время, то, что вечно протекает, Я – Брахма́ среди тех, кто созидает.\n\n**10.34.** Я – смерть, что поглощает все творенья, и Я – предтеча, из которой вдруг грядущее берёт своё рожденье. Из женщин, существующих вокруг, Я – Слава, что преследует лишь тех, в чьём сердце добродетель поселилась, и Я – Удача или же Успех, чья мощь в другой богине воплотилась, Я – Речь, но та, в которой звук любой наполнен чистотой и красотой. Я – Память, Я – Способность понимать и знание на деле применять, что средь людей Разумностью зовётся,\n\n**10.35.** Я – Устремлённость тех, кто к цели рвётся и может постоянно к ней шагать. Я – та, кого за скромность и за труд обычно Терпеливостью зовут. Я – «Брихат-са́ма», гимн средь песнопений прекрасной «Са́ма-веды», а средь всех известных миру форм стихотворений Я – га́ятри, доступная для тех, кто постоянно в благости живёт,\n\n**10.36.** средь месяцев Я – Маргаширша, тот, когда уже проходит сбор зерна. Я из времён – цветущая весна. Я многолик. Сказать пришла пора, что это Я – азартная игра средь действий, что мошенников пленяют, Я – блеск великолепья бытия, и Я – победа тех, кто побеждает, Я – приключенье, сила сильных – Я.\n\n**10.37.** Я средь потомков Вришни – Ва́судева, Я – Дхананджа́я средь пяти сынов, рождённых Па́нду, а из мудрецов Я – изложивший Веды Вья́садева.\n\n**10.38.** Из мер, что беззаконье пресекают, Я – кара. Я – безгрешность жития средь качеств, что победе помогают. Я – тайн безмолвье, мудрость мудрых – Я.\n\n**10.39.** Я – семя всех возможных форм творенья. Арджуна, знай, средь всех существ живых, подвижных иль живущих без движенья, никто не может жить без сил Моих.\n\n**10.40.** О покоритель недругов великий, Моих богатств божественные лики повсюду. Беспредельна мощь Моя. Примеры, что тебе представил Я, – всего лишь небольшое проявленье величья Моего распространенья.\n\n**10.41.** Пойми: всё разнообразие того, что красотой и мощью поражает сердца, на самом деле возникает из искр великолепья Моего.\n\n**10.42.** Зачем тебе, Арджуна, знать всё это подробно? Лишь частицею Своей пронзаю Я весь мир, все части света, поддерживая жизнь вселенной всей»."
    },
    "chapter-11.json": {
      "id": 11,
      "title": "Глава 11. Вишварупа-даршана-йога",
      "content": "# **Глава 11. Вишварупа-даршана-йога**\n\n*Йога созерцания вселенской формы*\n\n---\n\n**11.1.** Арджуна произнёс: «Ты мне открыл из милосердья скрытый смысл писаний и высшее среди духовных знаний. Ты от оков меня освободил. Разбиты все иллюзии мои.\n\n**11.2.** Когда я речи услыхал Твои о появленье и исчезновенье всех разнообразных форм существ живых, я понял из подробных слов Твоих, насколько беспредельно проявленье величья Твоего, о Тот, чьи очи мне лотосы напоминают очень.\n\n**11.3.** Итак, Ты мне всё это рассказал. Исполни же теперь моё желанье увидеть, как Ты входишь в мирозданье в обличье том, что Ты мне описал. Ты – Личность, что превыше остальных. Твой изначальный облик созерцая, Всевышний, очень видеть я желаю величье сил божественных Твоих.\n\n**11.4.** И если, о Господь, Ты полагаешь, что я способен созерцать Тебя, таким, каким Ты в космос проникаешь, яви мне беспредельного Себя. О Господин непостижимых сил, исполни то, о чём я попросил».\n\n**11.5.** Всевышний произнёс тогда: «Смотри на образ Мой, что скрыт от глаз обычных, и в сотнях тысяч обликов различных Моё великолепие узри, сын Притхи. Ты желал увидеть это обилье форм божественных Моих, исполненных разнообразья цвета. Так созерцай же проявленье их.\n\n**11.6.** О лучший среди Бхарат, ты столь мудр! Но прежде ты не видел пред собою сынов Адити, восемь Васу, Рудр, Ашвинов и Марутов. Я открою\n\n**11.7.** тебе их лики, множество чудес неслыханных, невиданных доселе людьми. Смотри, ты всё увидишь здесь. Всё – прямо здесь, в Моём вселенском теле. Арджуна, пред тобой предстанет зримо всё, что захочешь ты увидеть: всё, что движется и всё, что недвижимо, и то, чем ныне мирозданье живо, и то, что день грядущий принесёт.\n\n**11.8.** Но, безусловно, у тебя нет глаз, способных видеть образ Мой в творенье. Поэтому божественное зренье тебе, Арджуна, Я даю сейчас. Мистическую мощь Мою узри!»\n\n**11.9.** Санджая произнёс: «Господь Хари, стоящая над всеми Личность Бога, Верховный властелин любого йога, Владыка всех непостижимых сил, закончив говорить, о царь, явил Себя Арджуне в форме всей вселенной божественной и необыкновенной.\n\n**11.10-11.** Когда перед Арджуной проявились вселенской формы дивные черты, он увидал бесчисленные рты, глаза, что всюду перед ним открылись. Всевышний, Кришна, в образе творенья в уме Арджуны вызвал удивленье. В чудесных украшеньях и шелках с бесчисленным оружием в руках Господь, возникший вдруг со всех сторон, был дивными маслами умащён. Его цветы, гирлянды украшали. Они, как вечный сад, благоухали. Всё то, что пред Арджуной предстало, чудесно, ослепительно сияло, и, не имея края, не кончалось, но беспредельно всюду простиралось.\n\n**11.12.** Когда бы сотни тысяч солнц взошли однажды над поверхностью земли, тогда бы, может быть, понятно стало, как эта форма Господа сияла.\n\n**11.13.** Арджуна видел, сидя в колеснице, как в этой форме Господа богов вселенная со множеством миров могла в одной лишь точке поместиться, на части разделясь одновременно. Всё это было необыкновенно.\n\n**11.14.** И волосы на теле у него поднялись от видения того. Арджуна в величайшем изумленье перед Всевышним голову склонил, и, чувствуя не страх – благоговенье, сложив ладони, с Ним заговорил.\n\n**11.15.** Арджуна молвил: «Всех полубогов я вижу в теле у Тебя, о Боже, и остальные виды жизни тоже. Я вижу: Брахма, первый из творцов, который этот космос созидает, на лотосе вселенском восседает. Я также вижу Шиву, он в величье превыше остальных полубогов, я вижу всех великих мудрецов, и змеев, чьё божественно обличье.\n\n**11.16.** Я вижу удивительное тело в котором много рук и животов, ртов, глаз. Они повсюду, без предела. О Господин вселенной, Бог богов, о Форма совершенного творенья, нет края у Тебя и завершенья, нет середины и начала нет.\n\n**11.17.** О мой Господь, Ты излучаешь свет, сравнимый лишь с бушующим огнём иль светом солнца, ярким нестерпимо. В покрывшем всё сиянии Твоём Твоё обличье трудноразличимо.\n\n**11.18.** Твой свет мешает видеть мне, и всё же, куда б ни бросил я свой взгляд, о Боже, я всюду вижу образ Твой в лучах величья. Ты коронами блистаешь, и палицы несёшь в своих руках, и огненными дисками сверкаешь. Грехи Тебя не могут запятнать, и из всего, что можно познавать, Ты – наивысший смысл и цель познанья. Ты – вечная основа мирозданья, дающая покой вселенной всей. Ты старше всех. Энергии Твоей не исчерпать. Ты – истинный хранитель тех вечных свойств, которые душа порой забвенью предаёт, греша. Ты – Личность Бога, Высший повелитель. Такое, Кришна, я имею мненье.\n\n**11.19.** Ты без начала, Ты без продолженья, Ты без конца. И, судя по всему, пределов нет величью Твоему. Ты – обладатель бесконечных рук. Я вижу, что они везде вокруг. Твои глаза – и Солнце, и Луна. Огонь идёт из уст Твоих, пылая, вселенную собою опаляя. И вся она Тобой озарена.\n\n**11.20.** Тобой одним заполнено всё это пространство между Раем и Землёй, весь космос, все планеты, части света.\n\n**11.21.** Столь грозный и чудесный облик Твой увидев, все миры пришли в смятенье, о Высшая душа. В благоговенье сообщества богов перед Тобой склоняются и в форму эту входят. Из них иные с искренней мольбой, напуганные тем, что происходит, зовут Тебя, сложив ладони тесно. Сообщества великих мудрецов и совершенных личностей совместно к Тебе взывают звуками стихов\n\n**11.22.** из Вед, заполнив гимнами эфир, и произносят все: «Да будет мир!» Все Рудры и Адитьи, Васу, Садхьи, все Вишвадевы, двое близнецов Ашвинов, как и божества ветров, и предки, и гандхарвы в небесах, и асуры, якши, как и населенье живущих в высшей благости миров, – все на Тебя взирают с изумленьем.\n\n**11.23.** Весь космос, даже мир полубогов, пришёл в смятенье, видя пред собой гигантский, беспредельный образ Твой, в котором много ликов, глаз и рук, ног, бёдер, чрев, зубов. Ты страх внушаешь. Мной, как и всеми, овладел испуг.\n\n**11.24.** Ты головами небо подпираешь, сияешь переливами цветов. О Вишну, видя бездны многих ртов и глаз Твоих огромных излученье, я, безусловно, приведён в смятенье, мой ум не твёрд, и я не нахожу покоя и от страха весь дрожу.\n\n**11.25.** Прибежище вселенной, Бог богов, молю Тебя о милости смиренно. Ряды Твоих карающих зубов меня приводят в ужас, несомненно. Сиянье лиц Твоих напоминает о том, что время всё уничтожает. Я в панике, куда ни погляжу, приюта для себя не нахожу.\n\n**11.26-27.** В смятении великом вижу я, как входят Дхритараштры сыновья все, вместе с их великими войсками и всеми подчинёнными царями, в Твои везде зияющие рты и как всё это поглощаешь Ты. Средь них я Бхишмы с Дроной вижу лица. Я вижу: гибнет Карна, сын возницы. В разверстых зевах также мне видны все полководцы с нашей стороны. Все умирают. Многие из них с раздавленными гибнут головами и застревают меж зубов Твоих, разжёванные этими зубами.\n\n**11.28.** Совсем как реки в океан впадают, направленные волею Твоей, герои эти, львы среди людей, в Твоих горящих зевах исчезают.\n\n**11.29.** Как мотыльки летят из темноты в пылающий огонь и в нём сгорают, так все на свете люди погибают, стремясь в Твои зияющие рты.\n\n**11.30.** О Вишну, Ты повсюду проникаешь. Я вижу: всех людей со всех сторон Ты жаркими устами поглощаешь, Ты свет, грозящий смертью, излучаешь, весь мир Твоим сияньем опалён.\n\n**11.31.** Пожалуйста, скажи мне, кто же Ты, Господь богов, чьи грозные черты внушают страх. Прими моё почтенье. Будь милостив. Прошу Тебя в смиренье: поведай о Себе. Я знать желаю, каков же Ты, Начало всех начал, ведь, безусловно, я не понимаю Твой замысел».\n\n**11.32.** Верховный Бог сказал: «Я – время, величайший властелин, несущий всем планетам разрушенье и гибель тел всем существам в творенье. Помимо вас, Пандавов, ни один из воинов на этой стороне и на другой не выживет в войне.\n\n**11.33.** Поэтому, Арджуна, поднимись! Воспрянь и завоюй в сраженье славу! А после, покорив врагов, по праву цветущим царством вдоволь насладись. Все эти люди приговорены. Они убиты Мною, несомненно. Стреляющий из лука совершенно, стань для Меня орудием войны.\n\n**11.34.** Срази своих врагов на поле ратном, но после битвы не гордись собой, поскольку Дрона, Бхишма, Джаярдхада и Карна уничтожены лишь Мной, как и другие славные мужи. Убей же их в бою и не тужи. Вступи в сраженье и без лишних слов ты одолеешь в битве всех врагов».\n\n**11.35.** Санджая произнёс: «Услышав слово Того, кто многих демонов убил, Арджуна руки пред собой сложил и в трепете великом снова, снова склонился перед Кришной, а потом стал говорить, от страха запинаясь, не телом – всей душой пред Ним склоняясь:\n\n**11.36.** «Владыка сердца, в имени Твоём весь мир черпает радость, звуки эти к Тебе влекут, о Кришна, всех на свете. Лишь демоны, страшась Тебя, в смятенье бегут от звуков этих кто куда, но люди совершенные всегда склоняются перед Тобой в почтенье. Всё верно. Все идут своим путём.\n\n**11.37.** И как же им Тебе не поклоняться! Ты – величайший, как тут не предаться! Ты выше всех в могуществе Своём. Ты лучше даже Брахмы, ведь творенье в начале из Тебя берёт рожденье. О беспредельный, о Господь богов, вместилище вселенной, всех миров, Ты – высшая причина всех причин, Ты – тот источник, что неистощим.\n\n**11.38.** Ты к временному миру не причастен, Ты – вне него и гунам неподвластен. Ты – изначальный Бог, богов душа, Ты – Личность, Ты – старейший, Ты – нетленный приют для всех энергий во вселенной, Ты знаешь всё, и все познать спешат Тебя. Ты – запредельная обитель, которая над всем. Предела нет Тебе, Тобой пронизан этот свет.\n\n**11.39.** Ты – воздух, Ты – верховный повелитель, огонь, вода, луна и праотец, которого зовут все Веды Брахмой, и Ты же – Брахмы этого творец. Поклон Тебе, поклон тысячекратно! И вновь, и вновь почтительный поклон!\n\n**11.40.** И спереди, и сзади – отовсюду! Поклон Тебе, Господь, со всех сторон! Воистину, Ты – всё, и Ты повсюду! О сила, что никем неукротима! О, беспредельной мощи Господин! Могущество Твоё неизмеримо, Ты вездесущ, и всё – лишь Ты один!\n\n**11.41-42.** Тебя считая другом, я порой небрежно звал Тебя в общенье личном: «О Ядава», «О Кришна», «О друг мой», совсем не зная о Твоём величье. Пожалуйста, за всё меня прости. В безумии любви я допустил немало колких шуток в адрес Тво-й в часы, когда лежали мы с Тобой на ложе, отдыхая, иль когда за трапезой с Тобой вдвоём сидели, иль в час, когда с друзьями вместе ели.\n\n**11.43.** Все вольности, что я творил тогда, прости мне, Боже. Ты непогрешим и в качествах Своих неизмерим. Отец миров, Ты – всех существ родитель, подвижных они иль нет, всегда Ты – их святыня, вождь, Господь, учитель. Откуда же появится тогда\n\n**11.44.** хоть кто-то в трёх мирах, кто б равен был Тебе или Тебя превосходил, Господь энергий, коим нет границ! Перед Тобою простираясь ниц, молю Тебя, Верховный властелин, всеобщего достойный поклоненья: отец прощает, если дерзок сын, и к другу проявляет друг терпенье, и любящий к возлюбленной не строг, так Ты прости меня за всё, мой Бог.\n\n**11.45.** Я в состоянье счастья нахожусь, узрев Тебя в Твоём вселенском теле, которого не видел я доселе. Но я обличья этого боюсь. Мой ум в смятенье. Я прошу Тебя: будь милостив и вновь яви Себя в той форме, что является нетленной, владык Владыка и Приют вселенной!\n\n**11.46.** Я созерцать желаю облик Твой с украшенной короной головой, и палицу держащего, и лотос, и раковину с диском. Стань же вдруг, о Обладатель многих тысяч рук, четырёхруким, Свой вселенский образ\n\n**11.47.** смени, Господь, на вечный образ Свой, Нараяной предстань передо мной». Всевышний произнёс: «Я счастлив был, осуществить, Мой друг, твоё желанье Меня увидеть в этом мирозданье и потому перед тобой явил великой силой внутренней Моей гигантский дивный лик вселенной всей, исполненный сиянья, бесконечный. Знай, до тебя никто не созерцал, Арджуна, этот образ Мой предвечный.\n\n**11.48.** Ведь сколько б человек ни совершал ведические жертвоприношенья, сколь бы успешен ни был в изученье священных текстов Вед, Пуран иль сутр, в делах, что благочестье принесут, что б ни отдал он жителям небес и сколько бы ни совершил аскез, – ничто из этих средств не даст ему Меня увидеть в образе творенья. Ведь Я даю божественное зренье лишь тем, кто дорог сердцу Моему, как ты, средь Куру самый лучший воин. Лишь верный Мне узреть Меня достоин. Арджуна, никогда никто доселе\n\n**11.49.** Меня не видел в этом дивном теле. Мой облик устрашающий привёл тебя в смятенье, в ужас. Я желаю, чтоб страх из сердца твоего ушёл, чтоб ты в уме спокойствие обрёл. Я пред тобой тот облик открываю, который так желаешь ты узреть. Ты можешь с миром на него смотреть».\n\n**11.50.** Санджая продолжал: «Итак, Шри Кришна, сказав всё это, облик изменил, представ перед Арджуной в форме Вишну, а вслед за этим снова проявил\n\n**11.51.** двурукий несравненный образ Свой, чтоб дать Арджуне радость и покой. Арджуна с благодарностью сказал: «Теперь, как я того и пожелал, я вижу, о Джанардана, Тебя в Твоей прекрасной форме, что похожа на нас, людей. Мой ум спокоен, Боже! Тебя увидев, я пришёл в себя».\n\n**11.52.** Всевышний, чьи пленительны черты, сказал: «Мой облик, тот, что видишь ты, увидеть очень сложно всем, кто здесь живёт. И даже жители небес его стремятся вечно созерцать.\n\n**11.53.** Меня нельзя воистину познать, ни постоянно Веды изучая, ни тяжкие аскезы совершая, ни раздавая множество даров, ни проводя обряды вновь и вновь. Ведь без любви все формы поклоненья не могут дать божественного зренья.\n\n**11.54.** Но Мне в любви служенье предлагая, взамен наград и власти не желая, Арджуна, можно Мой увидеть лик таким, каким и ты его постиг. О ты, кому пленять врагов не сложно, знай: только так Меня пленить возможно.\n\n**11.55.** Арджуна, тот, кто дарит Мне свой труд, тот, кто Меня Всевышним почитает, кто Мне в любви служенье предлагает, кого мирские связи не влекут, корысть, умов теории сухие, кто любит все создания живые, врагов не видя для себя вовне, вернётся обязательно ко Мне»"
    },

      "title": "Глава 12. Бхакти-йога",
      "content": "# **Глава 12. Бхакти-йога**\n\n*Йога преданного служения*\n\n---\n\n**12.1.** Арджуна вопрошал: «А кто поднялся средь многих йогов выше остальных: тот, кто Тебе как Личности предался, всегда служа Тебе в трудах своих с большой любовью, как и подобает, иль тот, кто Дух безличный почитает, который силой чувств недостижим, сокрыт от всех и неуничтожим?»\n\n**12.2.** Всевышний молвил: «Те, кто сохраняют в уме сосредоточенность на Мне, те, кто Меня как Личность вспоминают и заняты всегда служеньем Мне, с духовной верой каждое мгновенье Мне предлагая труд и поклоненье, достигли совершенства бытия. Они – Мои. Так полагаю Я.\n\n**12.3-4.** Но те, кто жизнь всецело посвящают тому, что повсеместно проникает, тому, что за пределом постиженья, вне перемен, а также вне движенья, тому, что постоянно, и тому, что недоступно чувствам и уму, тому, что вне любых определений и скрыто за пределом проявлений, те, кто всецело чувства подчиняют и, равно относясь ко всем живым, всегда творят дела на благо им, Меня, конечно, также достигают.\n\n**12.5.** Но тем, чей ум вот так сосредоточен на том, что не проявлено никак, идти путём духовным очень, очень Для воплощённых душ и малый шаг к тому, что не проявлено твореньем, даётся с величайшим затрудненьем.\n\n**12.6-7.** Однако тех, кто для Меня сумел отречься от любых корыстных дел и все свои дела, слова и ум Мне посвящает, чувствуя влеченье ко Мне, кто совершает Мне служенье и, в сердце не имея прочих дум, на Мне сосредоточен постоянно, Мне поклоняясь, Партха, тех людей Я вызволяю Сам из океана материи: рождений и смертей.\n\n**12.8.** На Мне сосредоточься непременно умом, сумей свой разум погрузить в Меня, и с той поры ты будешь жить всегда во Мне, Всевышнем, несомненно.\n\n**12.9.** Арджуна, ты сумел завоевать богатства мира. Если же в итоге ты ум на Мне не можешь удержать, то следуй предписаньям бхакти-йоги. Жизнь в регулярном преданном служенье тебе поможет обрести стремленье достичь Меня.\n\n**12.10.** Но если ты не можешь законы бхакти-йоги соблюсти, ты сможешь совершенство обрести, когда Моим делам трудом поможешь.\n\n**12.11.** Но если ты не в силах выполнять и это, труд свой Мне не предлагая, ты можешь, душу в сердце постигая, другим плоды усилий отдавать.\n\n**12.12.** Но если ты не в силах отрекаться, то постарайся знанье обретать, но лучше в мыслях к Богу устремляться, ещё ценней – способность отдавать плоды своих трудов. Ведь отреченье приносит сердцу умиротворенье.\n\n**12.13-14.** В ком нет вражды и зависти к другим, кто дружелюбен, всем добра желает, кто не считает ничего своим и душу с бренным не отождествляет, кто в счастье и в беде невозмутим, кто терпелив и полон всепрощенья, всегда доволен бытиём своим, кто твёрдо выбрал только путь служенья, кто управляет чувствами вполне, в ком разум, как и ум, сосредоточен на Мне одном, тот очень дорог Мне.\n\n**12.15.** А также знай, что тот мне дорог очень, кто не приносит беспокойств другим и сам другими не обеспокоен, кто в радостях своих невозмутим и горестями жизни не расстроен, кто, Мне служа, освободиться смог от всевозможных страхов и тревог.\n\n**12.16.** Кто отрешён от дел в потоке дел, кто чист умом и телом, кто умел, кто безмятежен и не озабочен, кто не стремится, чтоб его труды однажды принесли ему плоды, тот преданный слуга Мне дорог очень.\n\n**12.17.** Кто не ликует и не унывает, кто не скорбит, что б ни случилось с ним, кто, Мне служа, иного не желает, не связан ни с хорошим, ни с плохим, поскольку для него их просто нет, такой Мой бхакта очень дорог Мне.\n\n**12.18-19.** Кто равное имеет отношенье к врагу и к другу, к почестям с хулой, кто безразличен к холоду с жарой, кто счастье ценит так же, как лишенье, а славу – как позор, кто никогда не примет ничего, что оскверняет, кто молчалив, но Бога прославляет, кто счастлив и доволен всем всегда, кого не беспокоит кров над ним, кто в знанье твёрд и непоколебим, кто посвятил себя служенью Мне, – такой Мой бхакта очень дорог Мне.\n\n**12.20.** Те, кто, как было сказано, идут дорогой дхармы, вечного служенья, и Мне себя всецело отдают с великой верой, в коей нет сомненья, те, кто поглощены лишь Мной одним, Меня считая сутью всех явлений, Всевышним, целью всех своих стремлений, – Мне чрезвычайно дороги они»."
    },
    "chapter-13.json": {
      "id": 13,
      "title": "Глава 13. Кшетра-кшетрагья-вибхага-йога",
      "content": "# **Глава 13. Кшетра-кшетрагья-вибхага-йога**\n\n*Йога различения поля и знатока поля*\n\n---\n\n**13.1.** Арджуна молвил: «Я хочу узнать всё о природе этого творенья, о том, кто обладатель наслажденья. Ещё прошу, о Кришна, рассказать о поле и о том, кто поле знает, и непременно расскажи о том, что настоящим знаньем называют и что же мы на деле познаём».\n\n**13.2.** Всевышний сыну Кунти отвечал: «Каунтея, тело полем называют того, кто это тело осознал, познавшим поле действия считают.\n\n**13.3.** Знай, Бхараты потомок, обо Мне, что Я, как будто находясь вовне, незримо в каждом теле пребываю как тела, так и владельцев знаю. Я полагаю: это пониманье природы тела и того, кто в нём живёт и знает тело – это знанье.\n\n**13.4.** Узнай же вкратце от Меня о том, что это поле действий составляет, о том, как изменяется оно, откуда это поле возникает, кто, зная поле, на него влияет.\n\n**13.5.** Нам это знанье мудрыми дано. Они различным образом сказали о поле и о знающих его и так нам мудрость в Ведах передали. Конечно, совершеннее всего суть этой важной темы объясняют «Веданта-сутры» краткие стихи, что связь причин и следствий раскрывают.\n\n**13.6-7.** Все Веды говорят, что пять стихий, забвенье вечных качеств, форм, деяний, которое зовётся ложным «Я», рассудок, состоянье бытия, в котором нет проявленных влияний, пять познающих чувств и пять других, стремящихся найти себе занятья, и ум, который превосходит их, а также пять объектов восприятья, желание, а также отвращенье, хорошие, плохие ощущенья и совокупность этого всего, а также проявления того, что выдаёт нам жизнь, как-то: мышленье, эмоции, решимость иль стремленье, – всё это поле действий составляет и много перемен претерпевает.\n\n**13.8-12.** Смирение, почёта нестяжанье, непричинение другим страданья, терпение, а также простота, к учителю святому обращенье, уместные вопросы и служенье усердное ему и чистота, и постоянство, строгость в отреченье от действий, что способны помешать себя слугою Бога сознавать, а также жизни чувств ограниченье (отказ от всех излишеств помогает принять всё то, что к Богу приближает), отсутствие любых отождествлений с изменчивыми телом и умом, признанье в сердце череды рождений, смертей, старенья и болезней злом, способность для духовного служенья с детьми, с женою прекратить общенье, или однажды свой оставить дом, когда мешают славить Бога в нём, невозмутимость в горе, как и в счастье, стремление служенью Мне отдать себя в любви всецело, не отчасти, которое нельзя поколебать, стремленье проживать уединённо, от тех, кто Мне не предан, отстранённо, желание себя как дух познать и Истину Верховную искать, – всё это Я познаньем объявляю, а прочее невежеством считаю.\n\n**13.13.** Сейчас Я собираюсь рассказать о том, что стоит в жизни познавать. Когда предметом этим овладеешь, ты вкус бессмертья ощутить сумеешь. Дух безначальный и подвластный Мне в отличие от временного поля не подчинён законам мира боли. Он от причин и следствий в стороне.\n\n**13.14.** А Сверхдуша – Господь всего вокруг. Во всех мирах и во вселенной всей присутствие Его несметных рук, ног, глаз, голов и ликов, и ушей.\n\n**13.15.** Первоисточник чувств существ живых, Сам не имеет бренных чувств таких. Живущих нужды удовлетворяя, Господь живёт, потребностей не зная. Материей никак не осквернён, извечно ей повелевает Он.\n\n**13.16.** Снаружи и внутри существ живых, подвижных и живущих без движенья, Он – Истина, которой постиженье немыслимо для чувств, что есть у них, поскольку эта Истина тонка\n\n**13.17.** по сущности своей необычайно. Она от всех безмерно далека и к каждому близка чрезвычайно. Как Сверхдуша в сердцах у всех Она, и, кажется, на всех поделена, но всё-таки едина, неделима, и всё живое Ей одной хранимо. Но знай, Она творенье поглощает а после вновь все формы проявляет.\n\n**13.18.** Она во всём, что излучает свет, является источником свеченья, Её среди проявленного нет. Сокрытая, Она вне тьмы творенья.\n\n**13.19.** Итак, тебе Я вкратце рассказал о поле, где свершаются деянья, затем весь путь познанья описал, а вслед за этим и предмет познанья. Но только те, кто для Меня живут, понять всё это правильно сумеют и так Мою природу обретут.\n\n**13.20.** Материя начала не имеет. Начала нет и у существ живых. И это нужно твёрдо знать о них. Три качества материя рождает, она же всё в творенье изменяет.\n\n**13.21.** Материя – орудье проявленья всех временных последствий и причин, всех внешних тел и чувств, и всех личин, в которых души ищут наслажденья, и, несомненно, каждый из живых – причина бед и радостей своих.\n\n**13.22.** Так, в материальном мире находясь, живые существа у гун во власти испытывают призрачное счастье. Без преданности Мне с природой связь толкает вновь и вновь рождаться их в условиях хороших и плохих.\n\n**13.23.** Но в каждом теле есть ещё один владелец, Он – Верховный Господин, который за душою наблюдает и ей вершить деянья позволяет. Он – Сверхдуша, владыка наслажденья, живущий за пределами творенья.\n\n**13.24.** И каждый, кто действительно поймёт природу материального творенья, три гуны, дух и все их отношенья, свободу непременно обретёт. Он может кем угодно здесь считаться, ему не нужно будет вновь рождаться.\n\n**13.25.** Одни Сверхдушу в сердце постигают, на Ней сосредоточившись умом, другие мир подробно изучают, о первоэлементах рассуждают, чтоб к Господу прийти таким путём. А третьи к этой Истине идут, когда свершают бескорыстный труд.\n\n**13.26.** Но те, кто Сверхдуши ещё не знают, Ей поклоняться всё же начинают, о Ней услышав от людей святых. Так склонность слушать, что сокрыта в них, им позволяет Истину понять и круг перерождений разорвать.\n\n**13.27.** О ты, который Бхарат возглавляет, знай: всё, что в этом мире возникает, чтоб жить подвижно или без движенья, – не что иное, как соединенье души, что тело-поле сознаёт, с тем телом, где сейчас она живёт.\n\n**13.28.** Кто, видя формы жизни, понимает, что Сверхдуша во всех телах живёт и так живых существ сопровождает, кто, видя это, также сознаёт, что Сверхдуша с душой не погибают, хотя сейчас находятся в телах,\n\n**13.29.** которые, по сути, просто прах, тот суть вещей на самом деле знает. Любой, кто видит вопреки всему, что Сверхдуша повсюду проникает, кто видит, что Она повелевает, тот не позволит своему уму сгубить себя. Такой святой мыслитель в конце войдёт в духовную обитель.\n\n**13.30.** И тот, кто видит, что любое дело во временных мирах творит не он, а лишь природой созданное тело, тот совершенным зреньем наделён.\n\n**13.31.** Развив в себе божественное зренье, значения мудрец не придаёт различью телесных форм в творенье. Кто с этим чистым виденьем живёт и всюду равно души замечает, тот Брахмана немедля достигает.\n\n**13.32.** Кто вечность прозревает, видит ясно: бессмертная душа не рождена, за гранью материального она и временной природе неподвластна. Сын Кунти, душу мир не истощает. И даже в бренном теле находясь, душа деяний в нём не совершает, и к ней не липнет их последствий грязь.\n\n**13.33.** Эфир, поскольку очень тонок он, повсюду в этом мире проникает, но он ни с чем здесь не соединён, так и душа, что в теле проживает, с ним никогда не соединена, хотя его осознаёт она. Кто дух постиг, способен видеть это.\n\n**13.34.** О Бхараты потомок, посмотри: как это Солнце, находясь внутри вселенной, ей даёт так много света, так и душа всё тело озаряет, когда в него однажды попадает.\n\n**13.35.** Кто разницу всегда осознаёт меж телом и душой, что в нём живёт, глазами знаний всюду видит суть и может отыскать незримый путь, что душу навсегда освобождает от рабства материальных тел-оков, тот самой высшей цели достигает, к Всевышнему придя в конце концов»."

    "chapter-14.json": {
      "id": 14,
      "title": "Глава 14. Гуна-трайя-вибхага-йога",
      "content": "# **Глава 14. Гуна-трайя-вибхага-йога**\n\n*Йога различения трех гун материальной природы*\n\n---\n\n**14.1.** Всевышний произнёс: «Я вновь скажу о том, что за пределами творенья, на высшую из истин укажу. Все мудрецы, которые в смиренье её однажды в сердце познавали, вершины совершенства достигали.\n\n**14.2.** Кто в этом знанье твёрдо пребывает, Мою природу духа обретает. В период материального творенья рожденья здесь не примет больше он и будет от страданий защищён, когда настанет мира разрушенье.\n\n**14.3.** Природа материальная моя (её порой Брахманом называют) все формы в мирозданье порождает, о Бхараты потомок, знай, что Я природу эту оплодотворяю и жизни проявляться позволяю.\n\n**14.4.** Сын Кунти, души всюду пребывают. Все виды жизни как своих детей природа материальная рождает. А Я – отец, дающий семя ей.\n\n**14.5.** Три материальных свойства: благость, страсть, невежество – природу составляют. Могучерукий, стоит раз попасть к ней в сеть, и эти качества пленяют тот вечный дух, что в теле воплощён.\n\n**14.6.** Поскольку благость чище, чем другие, она смывает все грехи былые и просветляет. Тот, кто ей пленён, к мирскому счастью, к знанию привязан и потому рождаться вновь обязан.\n\n**14.7.** Знай, страсть из вожделенья рождена, из жажды наслаждаться здесь телами. Сын Кунти, тех, кто воплощён, она пленяет их корыстными делами.\n\n**14.8.** Но, Бхараты потомок, знай, что тьма порождена незнаньем. Без сомненья, она незримо держит в заблужденье всех тех, кто воплощён, сводя с ума, окутывая ленью, долгим сном.\n\n**14.9.** Сын Бхараты, Я вновь скажу о том, что благость счастьем нынешним пленяет, стремленьем к счастью связывает страсть, невежество все знания скрывает, чтоб дух в тюрьму безумья мог попасть.\n\n**14.10.** Порою в людях благость побеждает и страсть, и тьму. И также страсть порой невежество и благость вытесняет, бывает превосходство и за тьмой, о Бхараты потомок.\n\n**14.11.** Говорят, что в теле человека девять врат. Их все сиянье знанья озаряет, коль благость в человеке возрастает.\n\n**14.12.** Когда же страсть, однако, верх берёт, то в человеке жадность возникает, его к деньгам безудержно влечёт, работать он сверх меры начинает, о лучший в роде Бхарат, вожделенье в нём разжигает жажду наслажденья.\n\n**14.13.** Когда же тьма невежества растёт, то человек во мраке цель теряет и действовать почти перестаёт, его то лень, то сон одолевают. Утратив разум свой и цель стремлений, он делается жертвой заблуждений.\n\n**14.14.** Кто в благостном сознанье умирает, на чистые планеты попадает, где мудрецы великие живут.\n\n**14.15.** Кто это тело в страсти покидает, тот снова воплощенье обретает средь тех, кого влечёт корыстный труд.\n\n**14.16.** Кто смерть свою в невежестве встречает, в животном мире тело получает. О результатах действий говорят: труд в благости приносит очищенье, плод страстных дел – всегда одно мученье, безумье – дел безумных результат.\n\n**14.17.** Из благости свет знаний возникает. Из страсти – алчность жгучая растёт. Невежество к безумию толкает, к иллюзиям и глупости ведёт.\n\n**14.18.** Кто в благости живёт и умирает, на высшие планеты попадает, кто в страсти жаждет миром насладиться, тот на земных планетах вновь родится, тот, кто во тьме невежества живёт, на низшие планеты, в ад идёт.\n\n**14.19.** Тот, кто за жизнью зорко наблюдает и видит всё, как есть, и понимает, что кроме гун природы здесь никто деяний никаких не совершает, кто сознаёт Всевышнего и то, что Он – вне этих гун, тот достигает духовного, иного бытия, где всё – природа вечная Моя.\n\n**14.20.** Трёх этих гун влияние поборов, любой, кто принял в теле воплощенье, становится свободен от оков страданий смерти, старости, рожденья. И, даже в бренном теле воплощён, бессмертия нектар вкушает он».\n\n**14.21.** Арджуна вопрошал: «О мой Господь, какие же приметы отличают того, кто смог три гуны побороть? Как он ведёт себя, как поступает? Как он достиг того, что гуны эти его поймать в свои не могут сети?»\n\n**14.22-25.** Всевышний произнёс: «В ком просветленье, привязанность и заблуждений дым не вызывают гнева, отвращенья, о Панду сын, присутствием своим, и кто уходом их не сокрушён, кто созерцает, как они влияют, но отстранён, поскольку знает он, что все деянья гуны совершают, кто вглубь себя всё время погружён, кто равно счастье и беду встречает, кто разницы совсем не замечает, будь перед ним земли обычной ком, иль камень, или слиток золотой, приятное иль мерзкое явленье, кто остаётся лишь самим собой, приемля равнодушно осужденье и похвалу, бесчестье и почёт, кто одинаков с другом и с врагами, кого ничто мирское не влечёт, кто не живёт корыстными делами, – о том молва правдиво говорит, что он уже над гунами стоит.\n\n**14.26.** Кто Мне себя всецело отдаёт, с любовью Мне служить не прекращает, уже вне гун материи живёт, он духа, он свободы достигает.\n\n**14.27.** Я – Брахмана безличного основа. (Я – Личность. Брахман – Мой духовный свет.) В нём смерти нет, уничтоженья нет. Он – вечность, средоточье не земного, а высшего блаженства всех живых, что изначально свойственно для них»."

      "title": "Глава 15. Пурушоттама-йога",
      "content": "# **Глава 15. Пурушоттама-йога**\n\n*Йога высшей личности*\n\n---\n\n**15.1.** Всевышний произнёс: «Корнями вверх, ветвями вниз баньян произрастает. Баньян тот вечен, листья – гимны Вед, его познавший Веды постигает.\n\n**15.2.** И вниз, и вверх простёрся лес ветвей. Три качества природы их питают. Объекты чувств побегами считают, корыстные желания людей – корнями, что от древа вниз растут и порождают материальный труд.\n\n**15.3.** Живущим в этом мире не дано увидеть форму этого растенья. Где у него начало, завершенье, где основанье – неизвестно. Но, взяв отрешённость – прочную секиру –\n\n**15.4.** необходимо навсегда срубить баньян, что в сердце корни смог пустить – привязанности к временному миру. Затем необходимо отыскать обитель, из которой в мир тревоги обратной для ушедших нет дороги, всего себя Всевышнему отдать, – Тому, в ком скрыт источник жизни всей от древности до настоящих дней.\n\n**15.5.** Кто победил гордыню, заблужденье, кто связи бесполезные порвал, кто вечное воистину познал, кто больше не в плену у вожделенья, в ком все сомненья преодолены, кто в счастье неизменным остаётся, как и в беде, Мне сердцем предаётся, тот достигает вечной той страны.\n\n**15.6.** Её не освещает Солнца свет, Луна, огонь, электроламп свеченье. Тем, кто достиг её, возврата нет сюда, в обитель смерти и рожденья. Всегда сама собой озарена Моя обитель, высшая страна.\n\n**15.7.** Мои живые вечные частицы, решившие отправиться сюда, чтоб этим бренным миром насладиться, его природой втянуты всегда в борьбу с врагами, коих просто счесть: пять чувств и ум, всего в итоге – шесть.\n\n**15.8.** Душа-владелец тело получает а после это тело оставляет, храня лишь впечатленье от него – так воздух носит запахи того, с чем он соприкасался. Впечатленья влекут её в другие воплощенья.\n\n**15.9.** Там будут уши и глаза опять, и будет кожа, орган осязанья, язык для вкуса, нос для обонянья, и будет ум, чтоб им воспринимать объекты чувств и этим наслаждаться, чтоб в новые тела переселяться.\n\n**15.10.** Глупцы не видят душу и не знают, как эта искра тело покидает, как в нём сейчас находится она, влиянием трёх гун опьянена, из тела извлекая наслажденье. Но знание даёт слепцам прозренье.\n\n**15.11.** Увидеть душу может только тот, кто неуклонен в совершенной йоге, кто сам себя как душу сознаёт. Но не увидит Истину в итоге тот, кто себя ещё не осознал, хотя попытки и предпринимал. Без разума глубокого, признаться, в реальности ему не разобраться.\n\n**15.12.** Знай, созерцанье разум развивает: сиянье Солнца, то, что освещает весь этот мир, сияние огня и свет Луны исходят от Меня.\n\n**15.13.** В тела планет парящих Я вхожу и на орбите каждую держу, и всё живое в мире сохраняю. Я, став Луной, растения питаю. Вливая в них энергию мою, Я жизненные соки им даю.\n\n**15.14.** Узнай Моё другое проявленье: Я становлюсь огнём пищеваренья в телах у всех, кто жаждет есть и пить. Четыре вида пищи неустанно Я помогаю им переварить. И воздух жизни, что вдыхают (прана), и воздух тот, что очищает тело, зависят также от Меня всецело.\n\n**15.15.** Я также в каждом сердце. От Меня исходят память, знанье и забвенье. Цель всех писаний, Вед, – постичь Меня. Я написал Веданты изреченья и, безусловно, Я – знаток всех Вед.\n\n**15.16.** Всего два вида душ живёт на свете: упавшие в материю и нет. Те, что попали к заблужденью в сети, всегда претерпевают перемены. Те, что в духовном мире, – неизменны.\n\n**15.17.** Но есть и Величайший, кроме них. Он – Личность, Высший Дух, и говорится, что Он, Господь всего, сумел вселиться в три мира и поддерживает их.\n\n**15.18.** Я, Запредельный, выше остальных: изменчивых, а также неизменных. Поскольку Я превосхожу любых живых существ, Меня во всех вселенных Верховным, Высшей Личностью считают и в Ведах всюду в мире прославляют.\n\n**15.19.** Кто таковым Меня осознаёт и никаких сомнений не имеет, что Я – Верховный Бог и Личность, тот всей полнотою знания владеет. Сын Бхараты, и телом, и душой с любовью служит Мне мудрец такой.\n\n**15.20.** Так тайну величайшую писаний тебе, безгрешный муж, поведал Я. Сын Бхараты, вершины всех познаний а также совершенства бытия в своих попытках достигает тот, кто тайну эту в сердце сознаёт»."

      "title": "Глава 16. Дайва-асура-сампада-вибхага-йога",
      "content": "# **Глава 16. Дайва-асура-сампада-вибхага-йога**\n\n*Йога различения божественных и демонических качеств*\n\n---\n\n**16.1-3.** Всевышний, Личность Бога, продолжал: «Бесстрашие (условье отреченья), поступков, слов и мыслей очищенье, желание понять, что Бог сказал, даренье благ, владение собой и жертвоприношений совершенье, ведических писаний изученье, стремленье жить в аскезе, нрав простой, непричиненье никому вреда, правдивость, также гнева подчиненье, от всей мирской корысти отреченье, спокойствие, желанье никогда не говорить дурного о других, не подмечая недостатки в них, ко всем живым созданьям состраданье, свобода от желания копить, способность мягким быть и скромным быть, решимость, сила воли, обузданье тех качеств, что приносят боль другим, умение прощать и в испытаньях быть стойким, а в поступках и желаньях быть чистым, независтливым, незлым, отсутствие любого ожиданья награды, славы или почитанья, – божественной природой рождены все эти свойства. Те, кто их являют, природой таковой наделены. Их праведными душами считают.\n\n**16.4.** Сын Бхараты, путь праведников свят. Сейчас Я опишу дорогу в ад. Кто горд собой, кто свысока глядит на прочих, жаждет славы, уваженья, по пустякам впадает в раздраженье, кто грубо, неучтиво говорит, не ведает, что можно, что нельзя, тех, Притхи сын, ведёт ещё с рожденья природа злобы, демонов стезя.\n\n**16.5.** Божественные свойства – путь к спасенью, но к рабству демоничные ведут. Сын Панду, ни о чём не беспокойся, в тебе уже с рожденья живут божественные, праведные свойства.\n\n**16.6.** Сын Притхи, в мире те, кто сотворён, всего двух разновидностей бывают: те, кто благой природой наделён, и те, в ком демонизм преобладает. Я о природе праведных людей тебе уже сказал весьма подробно. Теперь услышь о тех, чьё сердце злобно. Я опишу их нрав до мелочей.\n\n**16.7.** Те люди, чья природа демонична, не ведают, как нужно поступать, что правильно, что нет, им безразлично. И, безусловно, в них не отыскать ни должной чистоты, ни дел благих, ни правды.\n\n**16.8.** Эти люди заявляют: «Мир нереален, им не управляет причина или Бог. Причин других нет у него, помимо вожделенья, он сам возник из плотского влеченья».\n\n**16.9.** Такие убеждения приняв, самих себя и разум потеряв, уверены они, что процветают, но их дела разрушить угрожают весь этот мир, а также их самих, столь опытных в своих деяньях злых.\n\n**16.10.** Прибежище приняв у вожделенья, которое не утолить ничем, от гордости своей, от самомненья и жажды славы пьяные совсем, в иллюзии глубокой находясь, пленяясь преходящими вещами, они всё время выбирают грязь, захваченные грязными делами.\n\n**16.11.** Поскольку им присуще убежденье, что цель всей жизни – тела наслажденье, лишь смерть освобождает их в свой срок от бесконечных страхов и тревог.\n\n**16.12.** Запутавшись в надеждах, как в сетях, зависимые в каждое мгновенье от гнева своего и вожделенья, всегда с Моим законом не в ладах, они стремятся средства накопить затем, чтоб чувства удовлетворить.\n\n**16.13.** Обычно демон размышляет так: «Сегодняшняя прибыль мне поможет мои богатства в будущем умножить.\n\n**16.14.** Мной уничтожен ныне этот враг, такая участь ждёт и остальных соперников и недругов моих. Я – господин, я жизнью наслаждаюсь. Я к совершенству высшему пришёл, могущество и счастье приобрёл.\n\n**16.15.** В богатстве я над всеми возвышаюсь, поэтому всегда вокруг меня моё сиянье – знатная родня. Никто другой со мною не сравнится. Я буду блага людям раздавать и жертвоприношенья совершать, чтоб радостями жизни насладиться!» Так эти люди, обманув себя, живут, своё невежество любя.\n\n**16.16.** Страдая от бесчисленных тревог, окутанные сетью заблуждений, привязанные к росту наслаждений, они шагают в ад. Таков итог.\n\n**16.17.** Но что им ад! Довольные собой, они не признают авторитетов, дерзят другим, не слушают советов, в которых им даётся путь иной. Богатство и почёт их ослепляют,\n\n**16.18.** они кичатся ими пред толпой и жертвоприношенья совершают для вида, чтоб престиж повысить свой, без всяких правил, как угодно им. Так ложным самомнением своим, могуществом, гордыней, вожделеньем и гневом в заблужденье введены, они о Боге мыслят с отвращеньем, и речи их злословия полны по поводу Меня. Я пребываю в их собственных телах на зависть им и в прочих.\n\n**16.19.** Я навеки низвергаю их, в чьих сердцах лишь ненависть к другим, лишь злоба, самых подлых средь людей, в утробы демоничных матерей, в бескрайний океан перерожденья без всяких перспектив освобожденья.\n\n**16.20.** Вновь попадая в лоно к демоницам, за жизнью жизнь рождаясь средь глупцов, глупцы ко Мне не в силах подступиться. Сын Кунти, так они в конце концов доходят, чтоб исполнить все желанья, до самых мерзких форм существованья.\n\n**16.21.** В такие формы жизни, в сущий ад, дорогу открывают трое врат. Знай: это вожделенье, гнев и жадность.\n\n**16.22.** Они ведут к погибели души, и потому отречься поспеши от этих трёх врагов, отбросив жалость. Кто не стремится к этим трём вратам, кто их влиянья стойко избегает, тот человек, сын Кунти, посвящает себя благим спасительным делам. Он в них себя как душу сознаёт и к высшей цели, к Господу, идёт.\n\n**16.23.** Кто правила писаний отвергает, по прихоти, как хочется, живёт, тот совершенства, счастья не узнает и к высшей цели жизни не придёт.\n\n**16.24.** Поэтому свидетельства писаний необходимо правильно понять, свой долг и все запреты осознать, постигнув смысл священных указаний, так жить на каждой стадии пути, чтоб к совершенству высшему прийти»."

      "title": "Глава 17. Шраддха-трайя-вибхага-йога",
      "content": "# **Глава 17. Шраддха-трайя-вибхага-йога**\n\n*Йога различения трех видов веры*\n\n---\n\n**17.1.** «О Кришна, – так Арджуна вопрошал, – какое положенье занимает тот, кто слова писаний отвергает и метод поклоненья сам избрал? Он твёрдой верой в нечто наделён. Что: благость, страсть – ту веру в нём рождает? Невежество ли им повелевает? Влиянию чего подвластен он?»\n\n**17.2.** Всевышний так Арджуне отвечал: «Кто в этом мире тело получает, но выводами Вед пренебрегает, тот сам себя во власть трёх гун отдал. Им правят благость, страсть иль тьма незнанья. Тип веры в нём соответствует тому, какие гуны дóроги ему. Услышь о том Моё повествованье.\n\n**17.3.** Сын Бхараты, живое существо ту разновидность веры обретает, какая гуна в сердце у него над прочими двумя преобладает. Какая гуна на него влияет, такую веру он и проявляет.\n\n**17.4.** Кто под влияньем благости живёт, полубогам служенье отдаёт. А тот, в чьём сердце страсть преобладает, тот демонов всемерно почитает. Кем правит тьма, тот занят поклоненьем умершим, духам или привиденьям.\n\n**17.5-6.** Знай, демонами верно называют тех, кто, гордясь «величием» своим, из эгоизма и во вред другим суровую аскезу совершают совсем не так, как велено писаньем, а главное, совсем не для того. Под властью вожделенья своего, живя не долгом – только ожиданьем грядущих наслаждений и наград – они, глупцы, насилие творят над собственными бренными телами, а также над телами остальных, и оскорбляют этими делами Сверхдушу, что живёт в сердцах у них.\n\n**17.7.** Три гуны все явленья разделяют и разнообразье проявляют здесь. Они три вида пищи порождают и жертвоприношений, и аскез, три вида действий, что слывут благими. Послушай о различиях меж ними.\n\n**17.8.** Кто в благости живёт, предпочитает ту пищу, что способна жизнь продлить. Она существованье очищает и позволяет сильным, крепким быть, приносит счастье, удовлетворенье, она сочна, жиров хватает в ней, полезна и даёт оздоровленье, приятна сердцу праведных людей.\n\n**17.9.** А пищу тех, кто в страсти пребывает, излишек свойств и вкусов отличает: горька, кисла иль солона она, иль пряностью, иль остротой полна, – чрезмерно то одно, то сразу всё, горячая сверх меры иль сухая, – она страданья, горе, боль несёт. Но страстным людям нравится такая.\n\n**17.10.** Живущие в невежестве едят всё то, что больше трёх часов назад готовилось. Ни вкуса в пище той, ни свежести. Зловонные остатки, той трапезы, что совершал другой, конечно, не Господь и не святой. Но для невежды и отбросы сладки.\n\n**17.11.** Средь жертвоприношений только то творимым в гуне благости считают, которое осмысленно свершают, из чувства долга выполняя то,\n\n**17.12.** что говорят священные писанья без всякого корыстного желанья. Коль жертвователь выгод ожидает, заполучить желая результат, гордится в предвкушении наград, на жертвоприношенье страсть влияет. Знай, лучший в роде Бхарат, цель его – рай, материальной жизни торжество.\n\n**17.13.** Где всё творится вопреки писаньям и без раздачи освящённых блюд, где гимны Вед и мантры не поют, и где пренебрегают воздаяньем священникам, жрецам за их служенье, где веры нет, лишь показной обряд, – там тьма и мрак невежества царят, – нет блага в этом жертвоприношенье.\n\n**17.14.** Телесная аскеза – поклоненье Всевышнему, наставникам святым, тому, кто дал нам знанье, посвященье, и старшим, и родителям своим, а также чистота и прямота, супружеская верность, воздержанье для несемейных, и активность та, что счастье дарит всем, а не страданье.\n\n**17.15.** Аскеза речи – говорить слова правдивые, приятные, благие, которым не противятся другие, к тому же речь должна быть такова, чтоб от неё сознанье возвышалось и Вед ученье в звуке проявлялось.\n\n**17.16.** А удовлетворённость, нрав простой, способность не стремиться к наслажденью, быть молчаливым и владеть собой и выбирать дорогу к очищенью, чтоб не вошли в сознанье страсть и тьма, – всё это есть аскеза для ума.\n\n**17.17.** И если с верой в трансцендентный мир три вида Мной описанных аскез свершаются разумными людьми, которые не ищут выгод здесь, а все свои желания и труд Всевышнему смиренно отдают, то их аскезой в благости считают.\n\n**17.18.** Аскеза в гуне страсти пребывает, когда её из гордости творят, почёта, уважения хотят, людской молвы, а также поклоненья. Знай, что такой аскезы совершенье не может постоянным, долгим быть.\n\n**17.19.** Когда глупцы аскезу совершают, притом себя упорно истязают, чтоб этим вред кому-то причинить иль погубить, конечно, тьма, незнанье имеют на аскезу ту влиянье.\n\n**17.20.** Пожертвованье или же даренье во власти гуны благости тогда, когда даритель ценное отдал без всякой мысли о вознагражденье, в хорошем месте, выбрав день и час, для личности, достойной почитанья, из чувства долга, лишь к тому стремясь, чтоб так достичь духовного сознанья.\n\n**17.21.** Но если тот, кто жертвует, желает иметь взамен, хоть после, хоть сейчас, награду или жертвует, скупясь, пожертвованье в страсти пребывает.\n\n**17.22.** А если что-то жертвуется там, где правят грех, порок и оскверненье, в недобрый час, мошенникам, глупцам на пользу их корыстным, злым делам, иль отдаётся в дар с пренебреженьем (пусть даже людям, чьи чисты умы), – пожертвованье это в гуне тьмы.\n\n**17.23.** Любой процесс, который осквернён влияньем гун, очистить очень сложно, но если цель – Всевышний, то возможно. Три слова: «ом», «тат», «сат», – с былых времён поныне служат формой обращенья к Всевышнему, чтоб в дар Ему отдать аскезы, пищу, жертвоприношенья и всё, что можно в жизни отдавать. Их произносят брахманы, когда осуществляют жертвоприношенья, чтоб сам обряд, а также гимнов пенье адресовать Всевышнему всегда.\n\n**17.24.** Поскольку «ом» «Шри Вишну» означает, мудрец, который дух уже познал, любое дело или ритуал со слова «ом» смиренно начинает.\n\n**17.25.** Он совершает жертвоприношенье, аскезу или ценностей даренье как все писанья совершать велят: с той целью, чтобы был Всевышний рад. Так всякий, кто действительно стремится от материальных пут освободиться, за исполненье дел не ждёт наград, за жертвы – благ. Аскезы совершая и что-то ради Бога отдавая, он говорит при этом слово «тат».\n\n**17.26.** Сын Притхи, слово «сат» употребляют, чтоб высшую природу описать: о Боге и слуге Его сказать, и о делах, что их соединяют.\n\n**17.27.** «Сат» говорят о жертвоприношенье, аскезе, многообразье дел благих, направленных на удовлетворенье Всевышнего и слуг Его святых.\n\n**17.28.** Без веры в них все жертвоприношенья, дары, аскез суровых совершенье, сын Притхи, – это лжи смертельный яд. Их называют временным – «асат». Нет блага от свершенья дел таких ни в этой жизни, ни в каких других»."
