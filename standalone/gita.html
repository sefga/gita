      "title": "Глава 18. Мокша-санньяса-йога",
      "content": "# **Глава 18. Мокша-санньяса-йога**\n\n*Йога освобождения и совершенства отречения*\n\n---\n\n**18.1.** Арджуна молвил: «В чём итог наук? Поведай, Обладатель сильных рук. Скажи, убийца демонов сомненья, что отрешённость есть, что отреченье от мира? О Господь ума и чувств, я истину об этом знать хочу».\n\n**18.2.** Всевышний произнёс: «Отказ от дел, слов, мыслей, цель которых – наслажденье не Бога, а ума и бренных тел, учёные назвали «отреченье от мира». Если ж кто-то отдаёт другим любых своих деяний плод, средь тех, чья глубока осведомлённость, такой отказ зовётся «отрешённость».\n\n**18.3.** Средь мудрых нет согласия, признаться. Одни твердят, что нужно отказаться от всех корыстных дел, по сути злых. Но никогда, по мнению других, не должно человеку отрекаться от жертвоприношений, а богатства всегда необходимо раздавать, и нужно всем аскезы совершать.\n\n**18.4.** Услышь теперь Моё определенье того, что отрешённостью считать. Оно рассеет все твои сомненья. О лучший среди Бхарат, важно знать: три вида отрешённости бывает. Писание об этом сообщает.\n\n**18.5.** От жертвоприношений, дел благих и от аскез не нужно отрекаться. Они должны всё время совершаться. Они полезны даже для святых.\n\n**18.6.** Благодеянья, жертвоприношенья, аскезы – это формы очищенья. Но, безусловно, совершая их, не нужно результатов ждать от них. Сын Притхи, эти виды очищенья из чувства долга нужно выполнять. И это окончательное мненье.\n\n**18.7.** Знай: никогда не нужно прекращать достойных дел и долга исполненье. Коль кто-то жаждет долга избежать, иллюзией введённый в заблужденье, такую отрешённость нужно звать покрытой тьмой невежества.\n\n**18.8.** А тот, кто долг не исполняет, полагая, что долг лишь беспокойства принесёт, или из страха им пренебрегая, тот под влияньем страсти отрешён, – плодов хороших не получит он.\n\n**18.9.** Когда же кто-то должное творит лишь потому, что действовать обязан, и к результатам действий не привязан, то, значит, благость им руководит. Такое у Меня, Арджуна, мненье.\n\n**18.10.** Тот, кто и вправду мудр и отрешён, и благостью к тому же просветлён, тот трудится, отбросив все сомненья, без неприязни к действиям таким, что ум и тело могут беспокоить, и без пристрастья к действиям другим, что могут наслажденьем удостоить.\n\n**18.11.** Воистину, живое существо, которое сумело в плоть вселиться, совсем от дел не может отрешиться. Но стоит звать отрёкшимся того, кто смог от главной страсти отказаться: плодами дел однажды наслаждаться.\n\n**18.12.** Кто не достиг ступени отреченья от мира, после смерти обретёт своих деяний неизбежный плод. Одни получат ад, где лишь мученья, другие рай получат за труды, у третьих же смешаются плоды.\n\n**18.13.** Тем, кто отречься всё-таки сумел, не нужно после смерти наслаждаться или страдать от совершённых дел, не нужно в Рай идти и в Ад спускаться. О ты, известный силой рук своих, как сообщает нам Веданты слово, есть пять причин у действия любого. Сегодня от Меня узнай о них.\n\n**18.14.** Есть место – тело, действий исполнитель – душа, а чувств орудья – инструмент, усилия, а пятый элемент – есть Сверхдуша, Верховный повелитель.\n\n**18.15.** Будь это телом, речью иль умом, – все действия, что человек свершает хоть в верном направленье, хоть в ином, лишь эти пять причин определяют.\n\n**18.16.** Поэтому любому, кто считает, что он один – всех дел своих творец, рассудка, безусловно, не хватает. Он видит вещи так же, как глупец.\n\n**18.17.** Кто в действиях своих руководим не самостью, а Богом и приказом, кто от корысти исцелил свой разум, тот всюду от последствий дел храним. И, даже убивая в битве, он за действия свои не пострадает, греха убийства он не совершает и от последствий будет защищён.\n\n**18.18.** Три фактора к деяньям побуждают: цель знанья, знанье, тот, кто познаёт. Орудья чувств, усилия и тот, кто их вершит, деянье составляют.\n\n**18.19.** Три материальных гуны порождают три вида знаний, дел, существ живых, которые деянья совершают. Сейчас Я расскажу тебе о них.\n\n**18.20.** Узри: тем знаньем благость управляет, которое увидеть позволяет за многообразьем всех существ живых их вечный статус душ, частиц Моих, которые по качествам равны, хоть в разные тела поселены.\n\n**18.21.** Однако страсть на знание влияет в том случае, когда оно гласит, что существа, столь разные на вид, природой также разной обладают.\n\n**18.22.** Но знание невежеству равно, когда не дарит Истину оно, сознание людей порабощает одним как будто главным видом дел для улучшенья жизни бренных тел. Такое знанье узость отличает.\n\n**18.23.** Ту деятельность благостной считают, которую стабильно выполняют, размеренно и не за результат, не ожидая почестей, наград, а также без приязни, отвращенья, из чувства долга, ради очищенья.\n\n**18.24.** А деятельность ради наслажденья ума и тела или самомненья творимой в страсти мудрецы зовут. Особенность её – чрезмерный труд.\n\n**18.25.** Но деятельность тьмой поглощена, когда приносит за собой она порабощенье, боль и разрушенье, и если безответственно она писаньям вопреки совершена и вся её причина – заблужденье.\n\n**18.26.** Кто гунами природы не смущён, внимания на них не обращает, кто эгоизма полностью лишён, невозмутимо долг свой исполняет с решимостью и воодушевленьем, кто не обескуражен пораженьем, кто и в успехе долг свой сознаёт, тот под влияньем благости живёт.\n\n**18.27.** Кто к результатам дел своих привязан, кто действует совсем не потому, что он служить по совести обязан, а оттого что выгодно ему, кто жаден, злобен, в средствах неразборчив, нечист в привычках, радостью, бедой в сознании захвачен, озабочен, – во власти страсти человек такой.\n\n**18.28.** Кто, действуя, всегда пренебрегает тем, что в писаньях повелел Господь, кто, услаждая собственную плоть, духовные законы отвергает, кто, как осёл, упрям и часто лжив, всегда жесток, с другими груб, ленив, всегда угрюм, поскольку живо в нём желанье всё оставить на потом (он дело на минуту тянет год), – тот человек в невежестве живёт.\n\n**18.29.** Богатств завоеватель, а сейчас услышь о том подробный Мой рассказ, что разум и решимость здесь бывают трёх видов, ибо гуны так влияют.\n\n**18.30.** Сын Притхи, разум в благости всецело, когда способен верно рассудить, где кроется бездействие, где дело, чего не нужно делать, что творить, где страх, а где бесстрашье проявлять, что может рабство, что – свободу дать.\n\n**18.31.** Сын Притхи, разум в страсти пребывает, когда не может ясный дать ответ, что дхарму от безбожья отличает, что делать в жизни следует, что – нет.\n\n**18.32.** Невежеству тот разум подчинён, который ложь за правду принимает, путь дхармы он безбожьем называет, безбожие как дхарму ценит он. В иллюзии, сын Притхи, разум тот, он понимает всё наоборот.\n\n**18.33.** Решимость в гуне благости, когда со временем она не угасает и человеку в йоге позволяет ум, прану, чувства направлять всегда к Всевышнему и стойким оставаться: в сознанье от Него не отклоняться.\n\n**18.34.** Но в страсти та решимость пребывает, которая стремиться побуждает к тому, что процветанием зовут: к плодам аскез, молитв и поклоненья и к главному, чего от страсти ждут, – что чувства вновь получат наслажденья.\n\n**18.35.** В невежестве решимость пребывает, когда она совсем не помогает преодолеть чрезмерно долгий сон, страх, скорбь, печаль, а также заблужденья. Тому, кто ею, Партха, наделён, рассудка не хватает, без сомненья.\n\n**18.36.** Но пóлно о решимости. Сейчас услышь о видах счастья Мой рассказ. Их три, и тот, кто принял воплощенье, испытывая эти ощущенья, о лучший среди Бхарат, иногда страданья прекращает навсегда.\n\n**18.37.** То, что вначале яд напоминает, в конце нектар бессмертия даёт, и разум в человеке пробуждает, и к самосознанию ведёт, – есть счастье, что берёт своё рожденье из благости, довольства и смиренья.\n\n**18.38.** Другое счастье страстью рождено, и важно знать, что временно оно. Его источник – соприкосновенье телесных чувств с объектами влеченья.\n\n**18.39.** Оно нектар вначале, рай сулит, но вкус его в итоге ядовит. А третье счастье, словно привиденье, что не даёт душе себя познать, способно только лгать и отнимать вначале встречи с ним и в завершенье. Сном, ленью, заблужденьем рождено, в невежестве находится оно.\n\n**18.40.** Никто в существовании земном и выше, средь божественных созданий, не остаётся в бытии своём вполне свободным, чистым от влияний трёх этих гун, природой сотворённых.\n\n**18.41.** Из разных качеств, гунами рождённых, исходит разделение труда. По качествам легко узнать всегда, кто брахман, кто правитель, кто делец и кто простой рабочий, наконец. По качествам легко определить,\n\n**18.42.** кто ты, врагов способный покорить. Смирение и самообладанье, воздержанность и чистота во всём, терпенье, честность и, конечно, знанье, и мудрость – вечных истин пониманье, осмысленное в опыте своём, и следованье долгу Бога ради, без мыслей о признанье и награде, – вот качества природные людей, судьба которых – труд учителей.\n\n**18.43.** Их брахманами Веды величают. Они природу духа постигают. Бесстрашие и сила, дерзновенье на подвиги, находчивость, уменье сносить невзгоды, щедро отдавать и, вдохновляя всех, повелевать, – вот качества героев и царей, руководящих массами людей.\n\n**18.44.** Их кшатриями Веды называют. Они других умело защищают. Дельцов интересует процветанье. Их именуют вайшьями писанья. Рождённый их природой долг таков: жить земледельем, защищать коров и торговать. Простой рабочий люд, кого писанья шудрами зовут,\n\n**18.45.** имеет долг по качествам своим служить трудом сословиям другим. Свои и вновь свои дела творя, однажды совершенства достигают. Послушай же, чему благодаря те, кто свою природу занимают, способны совершенства достигать.\n\n**18.46.** Свой долг, природой данный, выполняя и деятельность эту предлагая Тому, кто может всюду проникать, Всевышнему, причине проявленья живых существ и самого творенья, возможно совершенство обрести: себя от пут материи спасти.\n\n**18.47.** Свой долг гораздо лучше исполнять, пусть даже совершенством не блистая, чем на чужом пути успех познать. Свой долг, природой данный, выполняя, грехом себя никак не запятнать.\n\n**18.48.** Никто не должен долг свой отвергать, пусть даже недостатков в нём не счесть. Сын Кунти, недостатки всюду есть. Изъян любое дело покрывает, ведь и огня без дыма не бывает.\n\n**18.49.** Тот человек, чей разум не стремится хоть чем-то материальным насладиться, поскольку не привязан к миру стал, кто ум и чувства тела обуздал, тот этим отреченьем обретает свободу от всего, что совершает.\n\n**18.50.** Теперь, сын Кунти, в кратком изложенье Я объясню, как действовать тому, кто пребывает в этом отреченье, чтоб осознать Всевышнего ему.\n\n**18.51-53.** Кто смог свой разум к Богу устремить, затем, найдя опору в этой цели, смог из сознанья скверну устранить и так решимость обрести на деле держать свой ум в узде, заняв его служением Источнику всего, кто отвергает сам в себе стремленье использовать всё то, что есть вокруг: объекты осязанья, вкус и звук, цвет, форму, запах, – ради наслажденья, кто не питает к миру ощущенья привязанности или отвращенья, в сознанье отстранён от людных мест, кто ровно столько, сколько нужно, ест, кто речью, телом и умом владеет, кто в транс медитативный погружён, кто самомненья ложного лишён, желанья стать могучим не имеет, кто гордость, вожделенье, гнев смирил, стяжательство и жадность покорил, кто не считает что-либо своим, кто умиротворён, невозмутим, – тот, кто таким на самом деле стал,\n\n**18.54.** уже себя как душу осознал. Он сразу Высший Брахман постигает и, ощущая с Ним единство, связь, в блаженстве трансцендентном находясь, он больше не скорбит и не желает. Он равно видит всех существ живых и обретает в этом положенье любовь ко Мне, духовное служенье, свободное от помыслов мирских.\n\n**18.55.** Лишь тот Меня таким как есть познает, кто Мне своё служенье предлагает без жажды лучшей жизнью насладиться иль от проблем навек освободиться. Кто так Меня в служенье познаёт, воистину, в духовный мир идёт.\n\n**18.56.** Хотя всё время человек такой деянья разнообразные свершает, он служит Мне и, защищённый Мной, он милостью Моею обретает свой вечный и неразрушимый дом.\n\n**18.57.** Во всех делах, в служении своём лишь на Меня всецело полагайся и под Моей защитой оставайся. Так, обретя прибежище во Мне и преданным служеньем занимаясь, всегда и всюду помни обо Мне, не прекращая и не отклоняясь.\n\n**18.58.** Меня осознавая каждый миг, Ты милостью Моей преодолеешь все трудности, которых полон мир. Но если ты услышать не сумеешь Меня и будешь действовать, как знаешь, сам по себе, себя ты потеряешь.\n\n**18.59.** И если ты прибежище найдёшь не в том, что Я прошу, а в самомненье, не станешь для Меня вступать в сраженье, ты путь совсем неверный изберёшь. И что тогда, по-твоему, случится, когда останусь не услышан Я? Природа материальная твоя тебя заставит всё-таки сразиться.\n\n**18.60.** Сын Кунти, ты не хочешь исполнять из-за иллюзий Моего желанья. Твоей природы временной влиянье тебя заставит всё же воевать.\n\n**18.61.** Всевышний в каждом сердце пребывает. Он каждого в скитаньях направляет, вселяет душу в тело. В свой черёд машины тел природа создаёт.\n\n**18.62.** О Бхараты потомок, всей душой Ему предайся ныне непременно. Так милостью Всевышнего святой ты обретёшь покой духовный свой и вечный мир, обитель, что нетленна.\n\n**18.63.** Итак, тебе Я знание открыл, ты тайной тайн великих обладаешь. Обдумай всё, о чём Я говорил, а после поступай как пожелаешь.\n\n**18.64.** Ты очень дорог Мне и потому Я вновь скажу ко благу твоему. Слова, что с уст Моих сейчас сойдут, все тайны мирозданья превзойдут.\n\n**18.65.** Всегда и всюду думай обо Мне, будь предан Мне, Мне время посвящая, Мне поклоняясь, ты придёшь ко Мне воистину. Я это обещаю тебе, поскольку ты – Мой дорогой и близкий друг. Вот долг первейший твой:\n\n**18.66.** отбрось всё многообразие долгов. Мне одному уверенно предайся. Я сделаю тебя от всех грехов свободным. Ничего не опасайся.\n\n**18.67.** Не говори об этом никогда тем, кто себя аскезой не смиряет, тем, кто не предан Мне, кто не желает служить и Мне завидует всегда.\n\n**18.68.** Кто смысл сей высшей тайны открывает для тех, кто предан Мне, тот обретает дар чистого любовного служенья и так ко Мне приходит без сомненья.\n\n**18.69.** Среди людей сейчас на свете нет того, кто был бы так же дорог Мне. И более того: в грядущем тоже не будет для меня слуги дороже.\n\n**18.70.** В Моих глазах любой, кто изучает наш диалог, что дхармой освящён, Мне предлагает разумом поклон.\n\n**18.71.** Кто диалогу этому внимает без зависти и с верой в святость слов, становится свободным от грехов и так планет прекрасных достигает, где каждый благочестьем обладает.\n\n**18.72.** Богатств завоеватель, Дхананджая, сумел ли ты, словам Моим внимая, на них сосредоточиться умом? Сын Притхи, что в сознании твоём: невежество, иллюзий пелена? Или сейчас рассеялась она?»\n\n**18.73.** Арджуна произнёс: «Все заблужденья рассеялись и память вновь со мной по милости Твоей, мой дорогой непогрешимый Кришна, все сомненья ушли из сердца. Я готов сейчас с решимостью исполнить Твой приказ».\n\n**18.74.** Санджая произнёс: «Так я внимал великих душ прекраснейшей беседе. Я слышал, как Шри Кришна отвечал Арджуне, приводя его к победе. Слова такое действие имели, что поднимались волосы на теле.\n\n**18.75.** Мне Вьясадева дал благословенье, и милостью его услышал я всё это сокровенное ученье о самых высших тайнах бытия. Владыка всех необычайных сил Шри Кришна сам его провозгласил.\n\n**18.76.** О царь, я постоянно вспоминаю Шри Кришны и Арджуны диалог, чудесный, изгоняющий порок, и вновь и вновь блаженство ощущаю.\n\n**18.77.** Когда бы мне ни вспомнилось опять Шри Кришны несравненное обличье, меня пленяет, царь, Его величье, и сердце начинает ликовать.\n\n**18.78.** И я хочу поведать в заключенье, какое у меня сложилось мненье: где б ни был Кришна, йогов повелитель, иль Притхи сын, носящий лук с собой, там будет изобилия обитель, победа, сила Бога, нрав святой»."
    }

    <!-- Встроенная адаптированная логика загрузки -->
    <script>
    // ===========================
// Content Loader Module
// ===========================
// Система дробной загрузки контента книги
// Каждая глава хранится в отдельном JSON-файле и загружается по требованию

class ChapterLoader {
    constructor(basePath = './content/') {
        this.basePath = basePath;
        this.manifest = null;
        this.cache = new Map(); // Кэш загруженных глав
        this.isInitialized = false;
    }

    // Инициализация — загрузка манифеста
    async init() {
        if (this.isInitialized) return this.manifest;
        this.manifest = GITA_DATA.manifest;
        this.isInitialized = true;
        console.log(`[ChapterLoader] Loaded manifest from memory: ${this.manifest.chapters.length} chapters`);
        return this.manifest;
    }

    // Получить список глав (только метаданные, без контента)
    getChaptersList() {
        if (!this.manifest) {
            throw new Error('ChapterLoader not initialized. Call init() first.');
        }
        return this.manifest.chapters.map(ch => ({
            id: ch.id,
            title: ch.title,
            subtitle: ch.subtitle
        }));
    }

    // Загрузить конкретную главу
    async loadChapter(chapterIndex) {
        if (!this.manifest) {
            throw new Error('ChapterLoader not initialized. Call init() first.');
        }

        const chapterMeta = this.manifest.chapters[chapterIndex];
        if (!chapterMeta) {
            throw new Error(`Chapter ${chapterIndex} not found`);
        }

        if (this.cache.has(chapterIndex)) {
            return this.cache.get(chapterIndex);
        }

        const chapter = GITA_DATA.chapters[chapterMeta.file];
        if (!chapter) {
            throw new Error(`Chapter data for ${chapterMeta.file} not found in GITA_DATA`);
        }

        this.cache.set(chapterIndex, chapter);
        return chapter;
    }

    // Предзагрузка следующей главы (для плавной навигации)
    async preloadNext(currentIndex) {
        const nextIndex = currentIndex + 1;
        if (nextIndex < this.manifest.chapters.length && !this.cache.has(nextIndex)) {
            // Загружаем в фоне, не блокируя
            this.loadChapter(nextIndex).catch(() => {
                // Игнорируем ошибки предзагрузки
            });
        }
    }

    // Количество глав
    get chaptersCount() {
        return this.manifest?.chapters?.length || 0;
    }

    // Получить название книги
    get bookTitle() {
        return this.manifest?.title || 'Книга';
    }
}

// Глобальный экземпляр
const chapterLoader = new ChapterLoader();

// Совместимость со старым API — создаём массив bookContent
// который заполняется по мере загрузки глав
let bookContent = [];

// Функция инициализации для использования в app.js
async function initBookContent() {
    await chapterLoader.init();

    // Создаём массив-заглушку с метаданными
    bookContent = chapterLoader.getChaptersList().map(ch => ({
        title: ch.title,
        subtitle: ch.subtitle,
        content: null, // Контент загружается по требованию
        loaded: false
    }));

    return bookContent;
}

// Функция загрузки контента главы
async function loadChapterContent(index) {
    if (bookContent[index]?.loaded) {
        return bookContent[index];
    }

    const chapter = await chapterLoader.loadChapter(index);
    bookContent[index] = {
        ...bookContent[index],
        content: chapter.content,
        loaded: true
    };

    // Предзагружаем следующую главу
    chapterLoader.preloadNext(index);

    return bookContent[index];
}

    </script>

    lineHeightValue: document.getElementById('lineHeightValue'),
    widthDecrease: document.getElementById('widthDecrease'),
    widthIncrease: document.getElementById('widthIncrease'),
    widthValue: document.getElementById('widthValue')
};

// ===========================
// Initialization
// ===========================
async function init() {
    loadSettings();
    applySettings();

    // Показываем индикатор загрузки
    showLoadingIndicator();

    try {
        // Инициализируем систему загрузки контента
        await initBookContent();

        renderChapterList();
        await loadLastPosition();
        setupEventListeners();
        updateChapterNavButtons();
    } catch (error) {
        console.error('Error initializing app:', error);
        showError('Ошибка загрузки книги. Пожалуйста, обновите страницу.');
    } finally {
        hideLoadingIndicator();
    }
}

// Показать индикатор загрузки
function showLoadingIndicator() {
    elements.content.innerHTML = `
        <div class="loading-indicator">
            <div class="loading-spinner"></div>
            <p>Загрузка главы...</p>
        </div>
    `;
}

// Скрыть индикатор загрузки
function hideLoadingIndicator() {
    const indicator = elements.content.querySelector('.loading-indicator');
    if (indicator) {
        indicator.remove();
    }
}

// Показать ошибку
function showError(message) {
    elements.content.innerHTML = `
        <div class="error-message">
            <p>${message}</p>
        </div>
    `;
}

// ===========================
// Settings Management
// ===========================
function loadSettings() {
    const saved = localStorage.getItem('bookReaderSettings');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            state.settings = { ...state.settings, ...parsed };
        } catch (e) {
            console.error('Error loading settings:', e);
        }
    }

    const savedPositions = localStorage.getItem('bookReaderPositions');
    if (savedPositions) {
        try {
            state.scrollPositions = JSON.parse(savedPositions);
        } catch (e) {
            console.error('Error loading positions:', e);
        }
    }
}

function saveSettings() {
    localStorage.setItem('bookReaderSettings', JSON.stringify(state.settings));
}

function savePositions() {
    localStorage.setItem('bookReaderPositions', JSON.stringify(state.scrollPositions));
}

function applySettings() {
    // Theme
    document.documentElement.setAttribute('data-theme', state.settings.theme);

    // Typography
    document.documentElement.style.setProperty('--font-size-base', `${state.settings.fontSize}px`);
    document.documentElement.style.setProperty('--line-height-base', state.settings.lineHeight);
    document.documentElement.style.setProperty('--content-width', `${state.settings.contentWidth}px`);

    // Font family
    document.body.classList.toggle('font-sans', state.settings.fontFamily === 'sans');

    // Update UI values
    elements.fontSizeValue.textContent = `${state.settings.fontSize}px`;
    elements.lineHeightValue.textContent = state.settings.lineHeight.toFixed(1);
    elements.widthValue.textContent = `${state.settings.contentWidth}px`;

    // Update font buttons
    document.querySelectorAll('.btn-font').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.font === state.settings.fontFamily);
    });

    // Update theme buttons
    document.querySelectorAll('.btn-theme-fun').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === state.settings.theme);
    });
}

// ===========================
// Chapter Management
// ===========================
function renderChapterList() {
    elements.chapterList.innerHTML = '';

    // Восстанавливаем заголовок sidebar (на случай если был показан TOC)
    const sidebarTitle = elements.sidebar.querySelector('h2');
    if (sidebarTitle) {
        sidebarTitle.textContent = 'Оглавление';
    }

    bookContent.forEach((chapter, index) => {
        const btn = document.createElement('button');
        btn.className = `chapter-item${index === state.currentChapter ? ' active' : ''}`;
        btn.innerHTML = `<span class="chapter-number">${index + 1}.</span> ${chapter.title}`;
        btn.addEventListener('click', () => navigateToChapter(index));
        elements.chapterList.appendChild(btn);
    });
}

async function navigateToChapter(index) {
    // Save current position
    state.scrollPositions[state.currentChapter] = window.scrollY;
    savePositions();

    // Update state
    state.currentChapter = index;
    localStorage.setItem('bookReaderCurrentChapter', index);

    // Show loading indicator
    showLoadingIndicator();

    try {
        // Render new chapter (async)
        await renderChapter(index);

        // Update sidebar
        document.querySelectorAll('.chapter-item').forEach((item, i) => {
            item.classList.toggle('active', i === index);
        });

        // Always scroll to top of chapter
        window.scrollTo(0, 0);
    } catch (error) {
        console.error('Error loading chapter:', error);
        showError('Ошибка загрузки главы');
    } finally {
        hideLoadingIndicator();
    }

    // Close sidebar on mobile
    closeSidebar();

    // Update navigation buttons
    updateChapterNavButtons();
}

async function renderChapter(index) {
    // Загружаем контент главы (с кэшированием)
    const chapter = await loadChapterContent(index);

    if (!chapter || !chapter.content) {
        throw new Error('Chapter content is empty');
    }

    // Convert markdown-like content to HTML
    let html = parseContent(chapter.content);

    elements.content.innerHTML = html;

    // Generate TOC
    generateTOC();
}

function parseContent(content) {
    // Configure marked options
    marked.setOptions({
        gfm: true,            // GitHub Flavored Markdown
        breaks: true,         // Convert \n to <br>
        headerIds: false,     // We generate our own IDs for TOC
        mangle: false         // Don't mangle email addresses
    });

    // Parse markdown to HTML using marked.js
    return marked.parse(content);
}

function generateTOC() {
    const headings = elements.content.querySelectorAll('h2, h3');
    elements.tocNav.innerHTML = '';

    headings.forEach((heading, index) => {
        // Add ID for linking
        const id = `section-${index}`;
        heading.id = id;

        const link = document.createElement('a');
        link.className = `toc-item level-${heading.tagName.toLowerCase().slice(1)}`;
        link.href = `#${id}`;
        link.textContent = heading.textContent;
        link.addEventListener('click', (e) => {
            e.preventDefault();
            heading.scrollIntoView({ behavior: 'smooth' });

            // Close TOC on mobile if open
            closeSidebar();
        });

        elements.tocNav.appendChild(link);
    });
}

function updateChapterNavButtons() {
    const isFirst = state.currentChapter === 0;
    const isLast = state.currentChapter === bookContent.length - 1;

    // Update bottom navigation
    elements.prevChapter.disabled = isFirst;
    elements.nextChapter.disabled = isLast;

    // Update header navigation
    elements.headerPrev.disabled = isFirst;
    elements.headerNext.disabled = isLast;

    // Update chapter indicator
    elements.chapterIndicator.textContent = `${state.currentChapter + 1} / ${bookContent.length}`;
}

async function loadLastPosition() {
    const lastChapter = localStorage.getItem('bookReaderCurrentChapter');
    if (lastChapter !== null) {
        state.currentChapter = parseInt(lastChapter, 10);
    }

    await renderChapter(state.currentChapter);

    // Restore scroll position
    const savedPosition = state.scrollPositions[state.currentChapter];
    if (savedPosition) {
        setTimeout(() => window.scrollTo(0, savedPosition), 100);
    }
}

// ===========================
// UI Interactions
// ===========================
function toggleSidebar() {
    elements.sidebar.classList.toggle('active');
    elements.sidebarOverlay.classList.toggle('active');
}

function closeSidebar() {
    elements.sidebar.classList.remove('active');
    elements.sidebarOverlay.classList.remove('active');
}

function toggleSettings() {
    elements.settingsPanel.classList.toggle('active');
}

function closeSettings() {
    elements.settingsPanel.classList.remove('active');
}

function toggleTheme() {
    state.settings.theme = state.settings.theme === 'light' ? 'dark' : 'light';
    applySettings();
    saveSettings();
}

// ===========================
// Reading Progress
// ===========================
function updateReadingProgress() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    elements.readingProgress.style.width = `${Math.min(progress, 100)}% `;
}

// ===========================
// TOC Active State
// ===========================
function updateActiveTocItem() {
    const headings = elements.content.querySelectorAll('h2, h3');
    const tocItems = elements.tocNav.querySelectorAll('.toc-item');

    let currentActive = null;

    headings.forEach((heading, index) => {
        const rect = heading.getBoundingClientRect();
        if (rect.top <= 150) {
            currentActive = index;
        }
    });

    tocItems.forEach((item, index) => {
        item.classList.toggle('active', index === currentActive);
    });
}

// ===========================
// Event Listeners
// ===========================
function setupEventListeners() {
    // Sidebar
    elements.sidebarToggle.addEventListener('click', toggleSidebar);
    elements.sidebarOverlay.addEventListener('click', closeSidebar);

    // Theme
    elements.themeToggle.addEventListener('click', toggleTheme);

    // Settings
    elements.settingsBtn.addEventListener('click', toggleSettings);
    elements.closeSettings.addEventListener('click', closeSettings);

    // Font size
    elements.fontDecrease.addEventListener('click', () => {
        if (state.settings.fontSize > 14) {
            state.settings.fontSize -= 2;
            applySettings();
            saveSettings();
        }
    });

    elements.fontIncrease.addEventListener('click', () => {
        if (state.settings.fontSize < 28) {
            state.settings.fontSize += 2;
            applySettings();
            saveSettings();
        }
    });

    // Line height
    elements.lineHeightDecrease.addEventListener('click', () => {
        if (state.settings.lineHeight > 1.3) {
            state.settings.lineHeight = Math.round((state.settings.lineHeight - 0.1) * 10) / 10;
            applySettings();
            saveSettings();
        }
    });

    elements.lineHeightIncrease.addEventListener('click', () => {
        if (state.settings.lineHeight < 2.2) {
            state.settings.lineHeight = Math.round((state.settings.lineHeight + 0.1) * 10) / 10;
            applySettings();
            saveSettings();
        }
    });

    // Content width
    elements.widthDecrease.addEventListener('click', () => {
        if (state.settings.contentWidth > 550) {
            state.settings.contentWidth -= 50;
            applySettings();
            saveSettings();
        }
    });

    elements.widthIncrease.addEventListener('click', () => {
        if (state.settings.contentWidth < 900) {
            state.settings.contentWidth += 50;
            applySettings();
            saveSettings();
        }
    });

    // Font family
    document.querySelectorAll('.btn-font').forEach(btn => {
        btn.addEventListener('click', () => {
            state.settings.fontFamily = btn.dataset.font;
            applySettings();
            saveSettings();
        });
    });

    // Theme toggle in settings
    document.querySelectorAll('.btn-theme-fun').forEach(btn => {
        btn.addEventListener('click', () => {
            const theme = btn.dataset.theme;
            state.settings.theme = theme;  // Update state
            applySettings();
            saveSettings();

            // Update button states
            document.querySelectorAll('.btn-theme-fun').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    // Chapter navigation (bottom buttons)
    elements.prevChapter.addEventListener('click', () => {
        if (state.currentChapter > 0) {
            navigateToChapter(state.currentChapter - 1);
        }
    });

    elements.nextChapter.addEventListener('click', () => {
        if (state.currentChapter < bookContent.length - 1) {
            navigateToChapter(state.currentChapter + 1);
        }
    });

    // Header navigation buttons
    elements.headerPrev.addEventListener('click', () => {
        if (state.currentChapter > 0) {
            navigateToChapter(state.currentChapter - 1);
        }
    });

    elements.headerNext.addEventListener('click', () => {
        if (state.currentChapter < bookContent.length - 1) {
            navigateToChapter(state.currentChapter + 1);
        }
    });

    // Mobile navigation
    elements.mobileChapters.addEventListener('click', () => {
        // Ensure chapters list is shown (not TOC)
        renderChapterList();
        toggleSidebar();
    });

    elements.mobileToc.addEventListener('click', () => {
        // Show TOC in sidebar on mobile
        const tocHtml = elements.tocNav.innerHTML;
        elements.chapterList.innerHTML = tocHtml;
        elements.sidebar.querySelector('h2').textContent = 'В этой главе';
        toggleSidebar();
    });
    elements.mobileSettings.addEventListener('click', toggleSettings);

    // Scroll events
    let scrollTimeout;
    window.addEventListener('scroll', () => {
        updateReadingProgress();
        updateActiveTocItem();

        // Save position periodically
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
            state.scrollPositions[state.currentChapter] = window.scrollY;
            savePositions();
        }, 500);
    });

    // Close settings when clicking outside
    document.addEventListener('click', (e) => {
        if (!elements.settingsPanel.contains(e.target) &&
            !elements.settingsBtn.contains(e.target) &&
            !elements.mobileSettings.contains(e.target)) {
            closeSettings();
        }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' && state.currentChapter > 0) {
            navigateToChapter(state.currentChapter - 1);
        } else if (e.key === 'ArrowRight' && state.currentChapter < bookContent.length - 1) {
            navigateToChapter(state.currentChapter + 1);
        } else if (e.key === 'Escape') {
            closeSidebar();
            closeSettings();
        }
    });
}

// Initialize when DOM is ready
document.addEventListener('DOMContentLoaded', init);

    </script>
    
</body>

</html>
